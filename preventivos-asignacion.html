<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asignación Preventivos - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:22px;}
.container{max-width:620px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.back{color:white;text-decoration:none;font-size:42px;font-weight:bold;}
.logo{font-size:46px;font-weight:900;}
.card,.item{background:#0b3475;border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;margin-bottom:18px;}
h1{font-size:30px;margin-bottom:8px;}
.subtitle{font-size:17px;opacity:.85;margin-bottom:14px;}
.info,.detalle{font-size:16px;margin-top:6px;opacity:.95;}
.titulo{font-size:22px;font-weight:900;margin-bottom:10px;}
.badge{background:white;color:#001f5b;border-radius:14px;padding:12px;margin-top:12px;font-weight:900;}
label{display:block;font-weight:bold;font-size:16px;margin-top:14px;margin-bottom:6px;}
select,input{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;color:#001f5b;}
button{width:100%;padding:16px;border:none;border-radius:15px;background:white;color:#001f5b;font-size:18px;font-weight:900;margin-top:14px;}
button:disabled{opacity:.6;}
.vacio{text-align:center;opacity:.85;margin-top:30px;font-size:17px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:24px;}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <a class="back" href="menu.html">‹</a>
    <div class="logo">TUBOSA</div>
    <div style="width:42px;"></div>
  </div>

  <div class="card">
    <h1>Asignación Preventivos</h1>
    <div class="subtitle">Asignar mantenimientos preventivos cargados desde SAP</div>
    <div class="info" id="usuario"></div>
  </div>

  <div id="lista">
    <div class="vacio">Cargando preventivos...</div>
  </div>

  <div class="footer">
    TUBOSA - Sistema de Mantenimiento<br>
    Versión 1.0
  </div>

</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbzeqAn-7ljMVh6lWLY2EsbQUyPIfXPGiQi8DGhMaULr8smReTfUm2BzGgXFFoPyJdI5DA/exec";

const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!usuario){
  window.location.href = "index.html";
}

const rolUsuario = String(usuario.rol || "").trim().toUpperCase();

if(!["SUPERVISOR", "PLANEADOR", "COORDINADOR", "ADMIN"].includes(rolUsuario)){
  alert("No tienes permiso para acceder a esta pantalla.");
  window.location.href = "menu.html";
}

document.getElementById("usuario").innerText =
  usuario.nombre + " - " + usuario.rol;

let tecnicos = [];

function obtenerCampo(obj, nombre){
  const clave = Object.keys(obj).find(k => k.trim() === nombre);
  return clave ? obj[clave] : "";
}

function formatearFecha(fecha){
  if(!fecha) return "";
  const texto = String(fecha);

  if(texto.includes("T")){
    const d = new Date(texto);
    if(!isNaN(d)) return d.toLocaleDateString("es-CO");
  }

  return texto;
}

async function cargarTecnicos(){
  const respuesta = await fetch(URL_API + "?accion=listar_tecnicos_activos");
  const data = await respuesta.json();

  if(!data.ok){
    alert("Error cargando técnicos: " + data.mensaje);
    tecnicos = [];
    return;
  }

  tecnicos = data.datos || [];
}

async function cargarPreventivos(){
  const lista = document.getElementById("lista");

  try{
    await cargarTecnicos();

    const respuesta = await fetch(URL_API + "?accion=listar&hoja=Preventivos");
    const data = await respuesta.json();

    const preventivos = data.datos || [];

    const pendientes = preventivos.filter(p => {
      const estado = String(obtenerCampo(p, "Estado") || "").trim().toLowerCase();

      return (
        estado === "" ||
        estado === "pendiente de asignación" ||
        estado === "pendiente de asignacion" ||
        estado === "programado"
      );
    });

    lista.innerHTML = "";

    if(pendientes.length === 0){
      lista.innerHTML = '<div class="vacio">No hay preventivos pendientes de asignación.</div>';
      return;
    }

    pendientes.forEach(p => {
      const id = obtenerCampo(p, "ID_Preventivo");
      const fechaInicio = obtenerCampo(p, "Fe.inic.extrema");
      const fechaFin = obtenerCampo(p, "Fe.fin extrema");
      const orden = obtenerCampo(p, "Orden");
      const claseOrden = obtenerCampo(p, "Clase de orden");
      const textoBreve = obtenerCampo(p, "Texto breve");
      const ubicacion = obtenerCampo(p, "Ubicac.técnica");
      const aviso = obtenerCampo(p, "Aviso");
      const status = obtenerCampo(p, "Status sistema");
      const equipo = obtenerCampo(p, "Equipo");
      const denominacionEquipo = obtenerCampo(p, "DenominaciónEquipo");
      const denominacionTecnica = obtenerCampo(p, "DenominaciónTecnica");
      const area = obtenerCampo(p, "Area");
      const linea = obtenerCampo(p, "Linea");
      const actividad = obtenerCampo(p, "Actividad") || textoBreve;
      const prioridad = obtenerCampo(p, "Prioridad");

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="titulo">🗓 Preventivo ${id || orden || ""}</div>

        <div class="detalle"><strong>Fecha inicio:</strong> ${formatearFecha(fechaInicio)}</div>
        <div class="detalle"><strong>Fecha fin:</strong> ${formatearFecha(fechaFin)}</div>
        <div class="detalle"><strong>Orden SAP:</strong> ${orden || "Sin orden"}</div>
        <div class="detalle"><strong>Clase de orden:</strong> ${claseOrden || ""}</div>
        <div class="detalle"><strong>Aviso:</strong> ${aviso || ""}</div>
        <div class="detalle"><strong>Status SAP:</strong> ${status || ""}</div>
        <div class="detalle"><strong>Ubicación técnica:</strong> ${ubicacion || ""}</div>
        <div class="detalle"><strong>Área:</strong> ${area || "Sin área"}</div>
        <div class="detalle"><strong>Línea:</strong> ${linea || "Sin línea"}</div>
        <div class="detalle"><strong>Equipo:</strong> ${equipo || "Sin equipo"}</div>
        <div class="detalle"><strong>Denominación equipo:</strong> ${denominacionEquipo || ""}</div>
        <div class="detalle"><strong>Denominación técnica:</strong> ${denominacionTecnica || ""}</div>
        <div class="detalle"><strong>Prioridad:</strong> ${prioridad || ""}</div>

        <div class="badge">
          Actividad:<br>${actividad || "Sin actividad definida"}
        </div>

        <label>Técnico asignado</label>
        <select id="tecnico_${id}">
          <option value="">Seleccione técnico...</option>
          ${opcionesTecnicos()}
        </select>

        <button id="btn_${id}" onclick="asignarPreventivo('${id}')">ASIGNAR PREVENTIVO</button>
      `;

      lista.appendChild(div);
    });

  }catch(error){
    lista.innerHTML = '<div class="vacio">Error cargando preventivos: ' + error + '</div>';
  }
}

function opcionesTecnicos(){
  return tecnicos.map(t => {
    const codigo = obtenerCampo(t, "Codigo");
    const nombre = obtenerCampo(t, "Nombre");
    const cargo = obtenerCampo(t, "Cargo");
    const area = obtenerCampo(t, "Area");

    return `
      <option value="${codigo}" data-nombre="${nombre}">
        ${nombre} - ${codigo} ${cargo ? "- " + cargo : ""} ${area ? "- " + area : ""}
      </option>
    `;
  }).join("");
}

async function asignarPreventivo(id){
  const select = document.getElementById("tecnico_" + id);
  const btn = document.getElementById("btn_" + id);

  const codigoTecnico = select.value;
  const nombreTecnico = select.options[select.selectedIndex].dataset.nombre || "";

  if(!codigoTecnico){
    alert("Debe seleccionar un técnico.");
    return;
  }

  const confirmar = confirm("¿Confirma asignar este preventivo a " + nombreTecnico + "?");

  if(!confirmar){
    return;
  }

  btn.disabled = true;
  btn.innerText = "ASIGNANDO...";

  try{
    const datos = {
      accion: "asignar_preventivo",
      ID_Preventivo: id,
      TecnicoAsignado: codigoTecnico,
      NombreTecnicoAsignado: nombreTecnico,
      SupervisorAsignado: usuario.codigo,
      UsuarioAsignador: usuario.nombre
    };

    const params = new URLSearchParams(datos);
    const respuesta = await fetch(URL_API + "?" + params.toString());
    const resultado = await respuesta.json();

    if(resultado.ok){
      alert("Preventivo asignado correctamente.");
      cargarPreventivos();
    }else{
      alert("Error: " + resultado.mensaje);
      btn.disabled = false;
      btn.innerText = "ASIGNAR PREVENTIVO";
    }

  }catch(error){
    alert("Error asignando preventivo: " + error);
    btn.disabled = false;
    btn.innerText = "ASIGNAR PREVENTIVO";
  }
}

cargarPreventivos();
</script>

</body>
</html>
