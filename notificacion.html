<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificar Novedad - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:22px;}
.container{max-width:520px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.back{color:white;text-decoration:none;font-size:42px;font-weight:bold;}
.logo{font-size:46px;font-weight:900;}
.card{background:#0b3475;border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;}
h1{font-size:30px;margin-bottom:8px;}
.subtitle{font-size:17px;opacity:.85;margin-bottom:24px;}
label{display:block;font-weight:bold;font-size:17px;margin-top:16px;margin-bottom:7px;}
input,select,textarea{width:100%;padding:16px;border:none;border-radius:15px;font-size:17px;color:#001f5b;}
textarea{min-height:110px;resize:vertical;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.readonly{background:#dbe4f5;}
.pendiente-box{display:none;background:#123f86;border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:16px;margin-top:18px;}
button{width:100%;padding:19px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:21px;font-weight:900;margin-top:26px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:24px;}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <a class="back" href="menu.html">‹</a>
    <div class="logo">TUBOSA</div>
    <div style="width:42px;"></div>
  </div>

  <div class="card">

    <h1>Notificar Novedad</h1>
    <div class="subtitle">Registro de fallas o novedades del turno</div>

    <div class="grid">
      <div>
        <label>Fecha</label>
<input id="fecha" type="date">
      </div>
      <div>
        <label>Hora</label>
<input id="hora" type="time">
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Técnico</label>
        <input id="tecnico" class="readonly" readonly>
      </div>
      <div>
        <label>Turno</label>
        <select id="turno">
          <option value="">Seleccione...</option>
          <option>Turno A - 6:00 am - 2:00 pm</option>
          <option>Turno B - 2:00 pm - 10:00 pm</option>
          <option>Turno C - 10:00 pm - 6:00 am</option>
          <option>Administrativo</option>
        </select>
      </div>
    </div>

    <label>Origen del reporte</label>
    <select id="origen">
      <option value="">Seleccione...</option>
      <option>Producción</option>
      <option>Mantenimiento</option>
      <option>Operario</option>
      <option>Supervisor</option>
    </select>

    <label>Línea</label>
    <select id="linea" onchange="cargarEquiposPorLinea()">
      <option value="">Cargando líneas...</option>
    </select>

    <label>Equipo</label>
    <select id="equipo" onchange="llenarEquipo()">
      <option value="">Seleccione primero una línea...</option>
    </select>

    <div class="grid">
      <div>
        <label>Área</label>
        <input id="area" class="readonly" readonly>
      </div>
      <div>
        <label>ID Equipo</label>
        <input id="idEquipo" class="readonly" readonly>
      </div>
    </div>

    <label>Supervisor responsable</label>
    <input id="nombreSupervisor" class="readonly" readonly placeholder="Se asigna automáticamente por área">

    <label>Descripción de la falla</label>
    <textarea id="descripcion" placeholder="Describa claramente la novedad..."></textarea>

    <div class="grid">
      <div>
        <label>Equipo parado</label>
        <select id="equipoParado">
          <option>No</option>
          <option>Sí</option>
        </select>
      </div>
      <div>
        <label>Tiempo parada (min)</label>
        <input id="tiempoParada" type="number" min="0" step="1" placeholder="Ej: 30">
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Queda pendiente</label>
        <select id="quedaPendiente" onchange="controlarPendiente()">
          <option>No</option>
          <option>Sí</option>
        </select>
      </div>
      <div>
        <label>Prioridad</label>
        <select id="prioridad">
          <option>Media</option>
          <option>Baja</option>
          <option>Alta</option>
          <option>Crítica</option>
        </select>
      </div>
    </div>

    <div id="bloquePendiente" class="pendiente-box">
      <label>Técnico que recibe</label>
      <select id="tecnicoRecibe">
        <option value="">Cargando técnicos...</option>
      </select>

      <label>Trabajo pendiente por realizar</label>
      <textarea id="trabajoPendiente" placeholder="Describa qué debe continuar el técnico del siguiente turno..."></textarea>
    </div>

<div class="grid">
  <div>
    <label>Trabajó con compañero</label>
    <select id="realizadoConCompanero" onchange="controlarCompanero()">
      <option>No</option>
      <option>Sí</option>
    </select>
  </div>
  <div>
    <label>Compañero</label>
    <select id="tecnicoCompanero" disabled>
      <option value="">Seleccione...</option>
    </select>
  </div>
</div>
    
    <label>Consecuencia producción</label>
    <select id="consecuenciaProduccion">
      <option value="">Cargando consecuencias...</option>
    </select>

    <div class="grid">
      <div>
        <label>Orden SAP</label>
        <input id="ordenSAP" placeholder="Opcional">
      </div>
      <div>
        <label>Aviso SAP</label>
        <input id="avisoSAP" placeholder="Opcional">
      </div>
    </div>

    <button id="btnGuardar" onclick="guardarNovedad()">GUARDAR NOVEDAD</button>

  </div>

  <div class="footer">
    TUBOSA - Sistema de Mantenimiento<br>
    Versión 1.0
  </div>

</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbzeqAn-7ljMVh6lWLY2EsbQUyPIfXPGiQi8DGhMaULr8smReTfUm2BzGgXFFoPyJdI5DA/exec";

const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!usuario){
  window.location.href = "index.html";
}

let equiposBD = [];
let usuariosBD = [];

function textoSelect(id){
  const select = document.getElementById(id);
  const opt = select.options[select.selectedIndex];
  return opt ? opt.textContent : "";
}

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function obtenerSupervisorPorArea(area){
  const a = normalizarTexto(area);

  if(a.includes("extrusion") || a.includes("servicios industriales") || a.includes("corrugado")){
    return {
      codigo: "SUP-JH",
      nombre: "Jorge Holguín"
    };
  }

  if(a.includes("mezclas") || a.includes("molinos") || a.includes("pulverizado")){
    return {
      codigo: "SUP-AV",
      nombre: "Andrés Vidal"
    };
  }

  return {
    codigo: "",
    nombre: "Sin supervisor asignado"
  };
}

function actualizarSupervisor(){
  const area = document.getElementById("area").value;
  const supervisor = obtenerSupervisorPorArea(area);
  document.getElementById("nombreSupervisor").value = supervisor.nombre;
  return supervisor;
}

function controlarPendiente(){
  const quedaPendiente = document.getElementById("quedaPendiente").value;
  const bloque = document.getElementById("bloquePendiente");

  if(quedaPendiente === "Sí"){
    bloque.style.display = "block";
  }else{
    bloque.style.display = "none";
    document.getElementById("tecnicoRecibe").value = "";
    document.getElementById("trabajoPendiente").value = "";
  }
}

function controlarCompanero(){
  const realizado = document.getElementById("realizadoConCompanero").value;
  const selectCompanero = document.getElementById("tecnicoCompanero");

  if(realizado === "Sí"){
    selectCompanero.disabled = false;
  }else{
    selectCompanero.disabled = true;
    selectCompanero.value = "";
  }
}

function obtenerTecnicoCompanero(){
  const select = document.getElementById("tecnicoCompanero");
  const opt = select.options[select.selectedIndex];

  if(!opt || !select.value){
    return {
      codigo: "",
      nombre: ""
    };
  }

  return {
    codigo: select.value,
    nombre: opt.textContent
  };
}
  
function obtenerTecnicoRecibe(){
  const select = document.getElementById("tecnicoRecibe");
  const opt = select.options[select.selectedIndex];

  if(!opt || !select.value){
    return {
      codigo: "",
      nombre: ""
    };
  }

  return {
    codigo: select.value,
    nombre: opt.textContent
  };
}

async function cargarCatalogo(nombreHoja, idSelect){

  const select = document.getElementById(idSelect);
  select.innerHTML = '<option value="">Cargando...</option>';

  try{
    const respuesta = await fetch(URL_API + "?accion=listar&hoja=" + encodeURIComponent(nombreHoja));
    const data = await respuesta.json();

    select.innerHTML = '<option value="">Seleccione...</option>';

    (data.datos || []).forEach(item => {
      const option = document.createElement("option");
      option.value = item.Codigo;
      option.textContent = item.Descripcion;
      select.appendChild(option);
    });

  }catch(error){
    alert("Error cargando catálogo " + nombreHoja + ": " + error);
    select.innerHTML = '<option value="">Error cargando</option>';
  }
}

async function cargarCatalogos(){
  await cargarCatalogo("Catalogo_Consecuencia", "consecuenciaProduccion");
}

function cargarInicial(){

  const ahora = new Date();

  document.getElementById("fecha").value =
    ahora.toISOString().split("T")[0];

  document.getElementById("hora").value =
    ahora.toTimeString().slice(0,5);

  document.getElementById("tecnico").value =
    usuario.nombre;
}

async function cargarUsuarios(){
  const select = document.getElementById("tecnicoRecibe");
  const selectCompanero = document.getElementById("tecnicoCompanero");
  select.innerHTML = '<option value="">Cargando técnicos...</option>';
  selectCompanero.innerHTML = '<option value="">Seleccione compañero...</option>';

  try{
    const respuesta = await fetch(URL_API + "?accion=listar&hoja=Usuarios");
    const data = await respuesta.json();

    usuariosBD = data.datos || [];

    const tecnicos = usuariosBD.filter(u =>
      normalizarTexto(u.Rol) === "tecnico" &&
      normalizarTexto(u.Activo) === "si"
    );

    select.innerHTML = '<option value="">Seleccione técnico...</option>';

    tecnicos.forEach(t => {
      const option = document.createElement("option");
      option.value = t.Codigo;
      option.textContent = t.Nombre;
      select.appendChild(option);
    });
if(String(t.Codigo).trim() !== String(usuario.codigo).trim()){

  const optionCompanero =
  document.createElement("option");

  optionCompanero.value =
  t.Codigo;

  optionCompanero.textContent =
  t.Nombre;

  selectCompanero.appendChild(
  optionCompanero
  );

}
  }catch(error){
    alert("Error cargando técnicos: " + error);
    select.innerHTML = '<option value="">Error cargando técnicos</option>';
  }
}

async function cargarEquipos(){
  const selectLinea = document.getElementById("linea");
  selectLinea.innerHTML = '<option value="">Cargando líneas...</option>';

  try{
    const respuesta = await fetch(URL_API + "?accion=listar&hoja=Equipos");
    const data = await respuesta.json();

    equiposBD = data.datos || [];

    const lineas = [...new Set(
      equiposBD
        .map(e => e.Linea)
        .filter(l => l && l !== "")
    )].sort();

    selectLinea.innerHTML = '<option value="">Seleccione...</option>';

    lineas.forEach(linea => {
      const option = document.createElement("option");
      option.value = linea;
      option.textContent = linea;
      selectLinea.appendChild(option);
    });

  }catch(error){
    alert("Error cargando equipos: " + error);
    selectLinea.innerHTML = '<option value="">Error cargando líneas</option>';
  }
}

function cargarEquiposPorLinea(){
  const linea = document.getElementById("linea").value;
  const selectEquipo = document.getElementById("equipo");

  selectEquipo.innerHTML = '<option value="">Seleccione...</option>';
  document.getElementById("area").value = "";
  document.getElementById("idEquipo").value = "";
  document.getElementById("nombreSupervisor").value = "";

  const filtrados = equiposBD.filter(e => e.Linea === linea);

  filtrados.forEach(eq => {
    const option = document.createElement("option");
    option.value = eq.NombreEquipo;
    option.textContent = eq.NombreEquipo;
    option.dataset.id = eq.ID_Equipo;
    option.dataset.area = eq.Area;
    selectEquipo.appendChild(option);
  });
}

function llenarEquipo(){
  const select = document.getElementById("equipo");
  const opt = select.options[select.selectedIndex];

  document.getElementById("idEquipo").value = opt.dataset.id || "";
  document.getElementById("area").value = opt.dataset.area || "";

  actualizarSupervisor();
}

async function guardarNovedad(){

  const btn = document.getElementById("btnGuardar");
  btn.disabled = true;
  btn.innerText = "GUARDANDO...";

  const consecuenciaTexto = textoSelect("consecuenciaProduccion");
  const supervisorAsignado = actualizarSupervisor();
  const tecnicoRecibe = obtenerTecnicoRecibe();
  const quedaPendiente = document.getElementById("quedaPendiente").value;
  const trabajoPendiente = document.getElementById("trabajoPendiente").value;
  const realizadoConCompanero = document.getElementById("realizadoConCompanero").value;
  const tecnicoCompanero = obtenerTecnicoCompanero();
  
  const datos = {
    hoja: "Notificaciones",
    ID_Notificacion: "NOT-" + Date.now(),
    FechaReporte: document.getElementById("fecha").value,
    Horareporte: document.getElementById("hora").value,
    ReportadoPor: usuario.codigo,
    NombreReportadoPor: usuario.nombre,
    Turno: document.getElementById("turno").value,
    Origenreporte: document.getElementById("origen").value,
    ClaseTrabajo: "CT01",
    Linea: document.getElementById("linea").value,
    Equipo: document.getElementById("equipo").value,
    Area: document.getElementById("area").value,
    ID_Equipo: document.getElementById("idEquipo").value,
    DescripcionFalla: document.getElementById("descripcion").value,
    TrabajoRealizado: "",
    EquipoParado: document.getElementById("equipoParado").value,
    TiempoParadaInicial: document.getElementById("tiempoParada").value,
    quedapendiente: quedaPendiente,
    Prioridad: document.getElementById("prioridad").value,
    ModoFalla: "",
    CausaProbable: "",
    ConsecuenciaProduccion: consecuenciaTexto,
    Estado: quedaPendiente === "Sí" ? "Pendiente por continuar" : "Reportado",
    OrdenSAP: document.getElementById("ordenSAP").value,
    AvisoSap: document.getElementById("avisoSAP").value,
    Supervisor: supervisorAsignado.codigo,
    NombreSupervisor: supervisorAsignado.nombre,
    FechaRevisionSupervisor: "",
    TecnicoRecibe: quedaPendiente === "Sí" ? tecnicoRecibe.codigo : "",
    NombreTecnicoRecibe: quedaPendiente === "Sí" ? tecnicoRecibe.nombre : "",
    TrabajoPendiente: quedaPendiente === "Sí" ? trabajoPendiente : "",
    ActividadTerminada: quedaPendiente === "Sí" ? "No" : "Sí",
    RealizadoConCompanero: realizadoConCompanero,
    TecnicoCompanero: realizadoConCompanero === "Sí" ? tecnicoCompanero.codigo : "",
    NombreTecnicoCompanero: realizadoConCompanero === "Sí" ? tecnicoCompanero.nombre : "",
    EstadoPendienteCompanero: realizadoConCompanero === "Sí" ? "Pendiente" : "",

    TiempoCompanero: "",
    ObservacionCompanero: "",
    FechaRegistroCompanero: "",
    HistorialIntervenciones: "",

    FechaCierre: "",
    ObservacionCierre: ""
  };

  if(!datos.Turno || !datos.Origenreporte || !datos.Linea || !datos.Equipo || !datos.DescripcionFalla){
    alert("Debe completar turno, origen, línea, equipo y descripción.");
    btn.disabled = false;
    btn.innerText = "GUARDAR NOVEDAD";
    return;
  }

  if(!datos.Supervisor){
    alert("El área seleccionada no tiene supervisor asignado. Revise el área del equipo.");
    btn.disabled = false;
    btn.innerText = "GUARDAR NOVEDAD";
    return;
  }

  if(quedaPendiente === "Sí" && (!tecnicoRecibe.codigo || !trabajoPendiente.trim())){
    alert("Debe seleccionar el técnico que recibe y describir el trabajo pendiente.");
    btn.disabled = false;
    btn.innerText = "GUARDAR NOVEDAD";
    return;
  }
if(
  realizadoConCompanero === "Sí" &&
  !tecnicoCompanero.codigo
){
  alert("Debe seleccionar el compañero que participó en el trabajo.");
  btn.disabled = false;
  btn.innerText = "GUARDAR NOVEDAD";
  return;
}
  if(!document.getElementById("consecuenciaProduccion").value){
    alert("Debe seleccionar la consecuencia de producción.");
    btn.disabled = false;
    btn.innerText = "GUARDAR NOVEDAD";
    return;
  }

  try{
    const params = new URLSearchParams(datos);
    const respuesta = await fetch(URL_API + "?" + params.toString());
    const resultado = await respuesta.json();

    if(resultado.ok){
      alert("Novedad guardada correctamente. Supervisor asignado: " + supervisorAsignado.nombre);
      window.location.href = "menu.html";
    }else{
      alert("Error: " + resultado.mensaje);
      btn.disabled = false;
      btn.innerText = "GUARDAR NOVEDAD";
    }

  }catch(error){
    alert("Error guardando novedad: " + error);
    btn.disabled = false;
    btn.innerText = "GUARDAR NOVEDAD";
  }
}

cargarInicial();
cargarEquipos();
cargarUsuarios();
cargarCatalogos();
controlarPendiente();
controlarCompanero();
</script>

</body>
</html>
