<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificar Novedad - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:18px;}
.container{max-width:520px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.logo{font-size:36px;font-weight:900;}
.back{color:white;text-decoration:none;font-size:34px;}
.card{background:#0b3475;border-radius:22px;padding:20px;border:1px solid rgba(255,255,255,.15);}
h1{font-size:28px;margin-bottom:8px;}
.subtitle{opacity:.85;margin-bottom:20px;}
label{display:block;margin-top:14px;margin-bottom:6px;font-weight:bold;}
input,select,textarea{width:100%;padding:14px;border-radius:14px;border:none;font-size:16px;color:#001f5b;}
textarea{min-height:95px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.readonly{background:#dbe4f5;}
button{width:100%;padding:18px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:20px;font-weight:900;margin-top:22px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:20px;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<a class="back" href="menu.html">‹</a>
<div class="logo">TUBOSA</div>
<div style="width:34px;"></div>
</div>

<div class="card">

<h1>Notificar Novedad</h1>
<div class="subtitle">Registro digital de novedades correctivas del turno</div>

<div class="grid">
<div>
<label>Fecha</label>
<input id="fecha" class="readonly" readonly>
</div>
<div>
<label>Hora</label>
<input id="hora" class="readonly" readonly>
</div>
</div>

<div class="grid">
<div>
<label>Técnico</label>
<input id="reportadoPor" class="readonly" value="TEC001" readonly>
</div>
<div>
<label>Turno</label>
<input id="turno" class="readonly" readonly>
</div>
</div>

<label>Origen del reporte</label>
<select id="origenReporte">
<option value="">Seleccione...</option>
<option>Producción</option>
<option>Operario</option>
<option>Supervisor Producción</option>
<option>Técnico</option>
</select>

<label>Línea</label>
<select id="linea">
<option value="">Seleccione...</option>
<option>Línea 10</option>
<option>Línea 11</option>
<option>Línea 15</option>
<option>Línea 16</option>
<option>Línea 18</option>
<option>Línea 19</option>
<option>Línea 20</option>
</select>

<label>Equipo</label>
<select id="equipo" onchange="llenarDatosEquipo()">
<option value="">Cargando equipos...</option>
</select>

<div class="grid">
<div>
<label>Área</label>
<input id="area" class="readonly" readonly>
</div>
<div>
<label>ID Equipo</label>
<input id="idEquipo" class="readonly" readonly>
</div>
</div>

<label>Descripción falla</label>
<textarea id="descripcionFalla" placeholder="Describa la novedad..."></textarea>

<div class="grid">
<div>
<label>Equipo parado</label>
<select id="equipoParado">
<option>No</option>
<option>Sí</option>
</select>
</div>
<div>
<label>Tiempo parada inicial</label>
<input id="tiempoParadaInicial" placeholder="Ej: 30 min">
</div>
</div>

<div class="grid">
<div>
<label>Queda pendiente</label>
<select id="quedaPendiente">
<option>No</option>
<option>Sí</option>
</select>
</div>
<div>
<label>Prioridad</label>
<select id="prioridad">
<option>Media</option>
<option>Baja</option>
<option>Alta</option>
<option>Crítica</option>
</select>
</div>
</div>

<label>Modo falla</label>
<select id="modoFalla">
<option>Por definir</option>
<option>No arranca</option>
<option>No realiza movimiento</option>
<option>Fuga</option>
<option>Ruido anormal</option>
<option>Falla eléctrica</option>
<option>Falla mecánica</option>
</select>

<label>Causa probable</label>
<select id="causaProbable">
<option>Por definir</option>
<option>Desgaste</option>
<option>Falta de ajuste</option>
<option>Falla eléctrica</option>
<option>Falla neumática</option>
<option>Falta de lubricación</option>
</select>

<label>Consecuencia producción</label>
<select id="consecuenciaProduccion">
<option>Sin afectación</option>
<option>Paro parcial</option>
<option>Paro total</option>
<option>Baja velocidad</option>
<option>Producto no conforme</option>
</select>

<div class="grid">
<div>
<label>Orden SAP</label>
<input id="ordenSAP" placeholder="Opcional">
</div>
<div>
<label>Aviso SAP</label>
<input id="avisoSAP" placeholder="Opcional">
</div>
</div>

<button type="button" onclick="guardarNotificacion()">GUARDAR NOVEDAD</button>

</div>

<div class="footer">
TUBOSA - Sistema de Mantenimiento<br>
Versión 1.0
</div>

</div>
  
<script src="api.js"></script>
  
<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwXekczQdDzjVBLWC8GPefjtKWYc1_j8XwQLuFdDjEFuHaC3aiL3Ocixo7EL2nRJ3C0ag/exec";

function calcularTurno(){
  const h = new Date().getHours();
  if(h >= 6 && h < 14) return "Turno A";
  if(h >= 14 && h < 22) return "Turno B";
  return "Turno C";
}

function cargarFechaHora(){
  const ahora = new Date();
  document.getElementById("fecha").value = ahora.toLocaleDateString("es-CO");
  document.getElementById("hora").value = ahora.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("turno").value = calcularTurno();
}

let equiposBD = [];

async function cargarEquiposFormulario(){

  equiposBD = await cargarEquipos();

  const selectEquipo = document.getElementById("equipo");
  selectEquipo.innerHTML = '<option value="">Seleccione...</option>';

  equiposBD.forEach(eq => {
    const option = document.createElement("option");
    option.value = eq.NombreEquipo;
    option.textContent = eq.NombreEquipo;
    option.dataset.id = eq.ID_Equipo;
    option.dataset.area = eq.Area;
    option.dataset.linea = eq.Linea || "";
    selectEquipo.appendChild(option);
  });
}

function llenarDatosEquipo(){

  const select = document.getElementById("equipo");
  const opt = select.options[select.selectedIndex];

  document.getElementById("idEquipo").value = opt.dataset.id || "";
  document.getElementById("area").value = opt.dataset.area || "";

  if(opt.dataset.linea){
    document.getElementById("linea").value = opt.dataset.linea;
  }
}

function guardarNotificacion(){

  const datos = {
    hoja: "Notificaciones",
    ID_Notificacion: "NOT-" + Date.now(),
    FechaReporte: document.getElementById("fecha").value,
    Horareporte: document.getElementById("hora").value,
    ReportadoPor: document.getElementById("reportadoPor").value,
    Turno: document.getElementById("turno").value,
    Origenreporte: document.getElementById("origenReporte").value,
    ClaseTrabajo: "CT01",
    Linea: document.getElementById("linea").value,
    Equipo: document.getElementById("equipo").value,
    Area: document.getElementById("area").value,
    ID_Equipo: document.getElementById("idEquipo").value,
    DescripcionFalla: document.getElementById("descripcionFalla").value,
    TrabajoRealizado: "",
    EquipoParado: document.getElementById("equipoParado").value,
    TiempoParadaInicial: document.getElementById("tiempoParadaInicial").value,
    QuedaPendiente: document.getElementById("quedaPendiente").value,
    Prioridad: document.getElementById("prioridad").value,
    ModoFalla: document.getElementById("modoFalla").value,
    CausaProbable: document.getElementById("causaProbable").value,
    ConsecuenciaProduccion: document.getElementById("consecuenciaProduccion").value,
    Estado: "ES06",
    OrdenSAP: document.getElementById("ordenSAP").value,
    AvisoSAP: document.getElementById("avisoSAP").value
  };

  if(!datos.Origenreporte || !datos.Linea || !datos.Equipo || !datos.DescripcionFalla){
    alert("Debe completar Origen, Línea, Equipo y Descripción.");
    return;
  }

  const params = new URLSearchParams(datos);
  const urlFinal = URL_SCRIPT + "?" + params.toString();

  const img = new Image();
img.src = urlFinal;

  alert("Novedad enviada. Verifica la hoja Notificaciones.");
  window.location.href = "menu.html";
}

document.addEventListener("DOMContentLoaded", async function(){

  alert("INICIANDO");

  cargarFechaHora();

  await cargarEquiposFormulario();

  alert("Equipos cargados: " + equiposBD.length);

});
});
</script>

</body>
</html>
