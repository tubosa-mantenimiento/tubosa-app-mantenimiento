<div class="container">

<div class="header">

<div style="width:42px;"></div>

<div class="card">

Mis Pendientes
</h1>

<div class="subtitle">
Actividades recibidas de otro turno y preventivos asignados
</div>

<div class="info" id="tecnico"></div>

</div>

Cargando pendientes...
</div>

<script>

const URL_API =
"https://script.google.com/macros/s/AKfycbzeqAn-7ljMVh6lWLY2EsbQUyPIfXPGiQi8DGhMaULr8smReTfUm2BzGgXFFoPyJdI5DA/exec";


const usuario =
JSON.parse(localStorage.getItem("usuarioActivo"));


if(!usuario){

window.location.href = "index.html";

}


document.getElementById("tecnico").innerText =
usuario.nombre + " - " + usuario.codigo;


let tecnicosActivos = [];


// =====================================================
// UTILIDADES
// =====================================================


function obtenerCampo(obj,nombre){

const clave =
Object.keys(obj).find(k =>
k.trim().toLowerCase() ===
nombre.trim().toLowerCase()
);

return clave ? obj[clave] : "";

}


function normalizar(valor){

return String(valor || "")
.trim()
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

}


function formatearFecha(fecha){

if(!fecha) return "";

const texto = String(fecha).trim();


if(/^\d{8}$/.test(texto)){

return texto.substring(6,8) + "/" +
texto.substring(4,6) + "/" +
texto.substring(0,4);

}


if(texto.includes("T")){

const d = new Date(texto);

if(!isNaN(d)){

return d.toLocaleDateString("es-CO");

}

}

return texto;

}


function clavePreventivo(p){

return obtenerCampo(p,"ID_Preventivo") ||
obtenerCampo(p,"Orden");

}


// =====================================================
// CARGAR TÉCNICOS
// =====================================================


async function cargarTecnicos(){

try{

const respuesta = await fetch(
URL_API + "?accion=listar_tecnicos_activos"
);

const data = await respuesta.json();

tecnicosActivos = data.datos || [];

}
catch(error){

console.error(
"Error cargando técnicos:",
error
);

tecnicosActivos = [];

}

}


// =====================================================
// OPCIONES DE TÉCNICOS
// =====================================================


function opcionesTecnicos(){

let opciones =
'<option value="">Seleccione técnico</option>';


tecnicosActivos.forEach(t => {

const codigo =
obtenerCampo(t,"Codigo") ||
obtenerCampo(t,"Código") ||
obtenerCampo(t,"codigo");

const nombre =
obtenerCampo(t,"Nombre") ||
obtenerCampo(t,"nombre");


if(
String(codigo).trim() !==
String(usuario.codigo).trim()
){

opciones +=
`<option
value="${codigo}"
data-nombre="${nombre}">
${nombre}
</option>`;

}

});


return opciones;

}


// =====================================================
// MOSTRAR / OCULTAR ENTREGA
// =====================================================


function cambiarActividadTerminada(clave){

const valor =
document.getElementById(
"actividad_terminada_" + clave
).value;

const bloque =
document.getElementById(
"bloque_entrega_" + clave
);


if(valor === "No"){

bloque.style.display = "block";

}
else{

bloque.style.display = "none";

}

}


// =====================================================
// MOSTRAR / OCULTAR COMPAÑERO
// =====================================================


function cambiarCompanero(clave){

const valor =
document.getElementById(
"con_companero_" + clave
).value;

const bloque =
document.getElementById(
"bloque_companero_" + clave
);


if(valor === "Sí"){

bloque.style.display = "block";

}
else{

bloque.style.display = "none";

}

}


// =====================================================
// CARGAR PENDIENTES
// =====================================================


async function cargarPendientes(){

const lista =
document.getElementById("lista");


try{


await cargarTecnicos();


const respNoti =
await fetch(
URL_API +
"?accion=listar&hoja=Notificaciones"
);

const dataNoti =
await respNoti.json();


const respPrev =
await fetch(
URL_API +
"?accion=listar&hoja=Preventivos"
);

const dataPrev =
await respPrev.json();


const novedades =
dataNoti.datos || [];


const preventivos =
dataPrev.datos || [];


// -----------------------------------------------------
// CORRECTIVOS RECIBIDOS
// -----------------------------------------------------


const pendientesCorrectivos =
novedades.filter(n => {

const tecnicoRecibe =
String(
obtenerCampo(n,"TecnicoRecibe")
).trim();

const terminada =
normalizar(
obtenerCampo(n,"ActividadTerminada")
);

return (

tecnicoRecibe ===
String(usuario.codigo).trim()

&&

terminada !== "si"

);

});


// -----------------------------------------------------
// PREVENTIVOS PRINCIPALES
// -----------------------------------------------------


const pendientesPreventivos =
preventivos.filter(p => {

const tecnicoAsignado =
String(
obtenerCampo(p,"TecnicoAsignado")
).trim();

const tecnicoRecibe =
String(
obtenerCampo(p,"TecnicoRecibe")
).trim();

const tecnicoCompanero =
String(
obtenerCampo(p,"TecnicoCompanero")
).trim();

const estadoCompanero =
normalizar(
obtenerCampo(p,"EstadoPendienteCompanero")
);
  
const estado =
normalizar(
obtenerCampo(p,"Estado")
);

const actividadTerminada =
normalizar(
obtenerCampo(p,"ActividadTerminada")
);


const asignadoPrincipal =

tecnicoAsignado ===
String(usuario.codigo).trim()

&&

(
estado === "asignado" ||
estado === "en ejecucion"
);


const recibidoContinuidad =

tecnicoRecibe ===
String(usuario.codigo).trim()

&&

actividadTerminada !== "si"

&&

estado === "en ejecucion";

const apoyoCompanero =

tecnicoCompanero ===
String(usuario.codigo).trim()

&&

estadoCompanero === "pendiente";


return (
asignadoPrincipal ||
recibidoContinuidad ||
apoyoCompanero
);

});


lista.innerHTML = "";


if(
pendientesCorrectivos.length === 0 &&
pendientesPreventivos.length === 0
){

lista.innerHTML =
'<div class="vacio">No tienes pendientes asignados.</div>';

return;

}


pendientesCorrectivos
.reverse()
.forEach(n => {

lista.appendChild(
crearTarjetaCorrectivo(n)
);

});


pendientesPreventivos
.reverse()
.forEach(p => {

const tecnicoCompanero =
String(
obtenerCampo(p,"TecnicoCompanero")
).trim();

const estadoCompanero =
normalizar(
obtenerCampo(p,"EstadoPendienteCompanero")
);

if(
tecnicoCompanero === String(usuario.codigo).trim()
&&
estadoCompanero === "pendiente"
){

lista.appendChild(
crearTarjetaApoyoCompanero(p)
);

}else{

lista.appendChild(
crearTarjetaPreventivo(p)
);

}

});

}
catch(error){

lista.innerHTML =
'<div class="vacio">Error cargando pendientes: ' +
error +
'</div>';

}

}


// =====================================================
// TARJETA CORRECTIVO
// =====================================================


function crearTarjetaCorrectivo(n){

const id =
obtenerCampo(n,"ID_Notificacion");

const linea =
obtenerCampo(n,"Linea");

const equipo =
obtenerCampo(n,"Equipo");

const area =
obtenerCampo(n,"Area");

const fecha =
obtenerCampo(n,"FechaReporte");

const hora =
obtenerCampo(n,"Horareporte");

const reportadoPor =
obtenerCampo(n,"NombreReportadoPor");

const descripcion =
obtenerCampo(n,"DescripcionFalla");

const trabajoPendiente =
obtenerCampo(n,"TrabajoPendiente");

const prioridad =
obtenerCampo(n,"Prioridad");

const ordenSAP =
obtenerCampo(n,"OrdenSAP") ||
"Sin orden SAP";

const tiempoInicial =
obtenerCampo(n,"TiempoParadaInicial") ||
"0";


const div =
document.createElement("div");

div.className = "item";


div.innerHTML = `

<div class="titulo">
📌 ${linea || ""} -
${equipo || "Equipo no definido"}
</div>


<div class="detalle">
<strong>ID:</strong>
${id}
</div>


<div class="detalle">
<strong>Fecha reporte:</strong>
${formatearFecha(fecha)}
${hora || ""}
</div>


<div class="detalle">
<strong>Área:</strong>
${area || "Sin área"}
</div>


<div class="detalle">
<strong>Reportado por:</strong>
${reportadoPor || ""}
</div>


<div class="detalle">
<strong>Prioridad:</strong>
${prioridad || ""}
</div>


<div class="detalle">
<strong>Orden SAP:</strong>
${ordenSAP}
</div>


<div class="detalle">
<strong>Tiempo inicial reportado:</strong>
${tiempoInicial} min
</div>


<div class="detalle">
<strong>Falla:</strong>
${descripcion || ""}
</div>


<div class="badge">

Trabajo pendiente:<br>

${trabajoPendiente ||
"Sin descripción"}

</div>


<label>
Tiempo utilizado para terminar (min)
</label>

<input
id="tiempo_${id}"
type="number"
min="1"
step="1"
placeholder="Ej: 45"
>


<label>
Observación de cierre
</label>

<textarea
id="obs_${id}"
placeholder="Describa qué se realizó para cerrar el pendiente..."
></textarea>


<button
id="btn_${id}"
onclick="cerrarPendiente('${id}')"
>

FINALIZAR PENDIENTE

</button>

`;


return div;

}


// =====================================================
// TARJETA PREVENTIVO
// =====================================================


function crearTarjetaPreventivo(p){

const id =
obtenerCampo(p,"ID_Preventivo");

const orden =
obtenerCampo(p,"Orden");

const clave =
clavePreventivo(p);

const estado =
obtenerCampo(p,"Estado");

const fechaInicio =
obtenerCampo(p,"Fe.inic.extrema");

const fechaFin =
obtenerCampo(p,"Fe.fin extrema");

const area =
obtenerCampo(p,"Area");

const linea =
obtenerCampo(p,"Linea");

const equipo =
obtenerCampo(p,"Equipo");

const denominacionEquipo =
obtenerCampo(p,"DenominaciónEquipo");

const denominacionTecnica =
obtenerCampo(p,"DenominaciónTecnica");

const actividad =
obtenerCampo(p,"Actividad") ||
obtenerCampo(p,"Texto breve");


const tecnicoRecibe =
String(
obtenerCampo(p,"TecnicoRecibe")
).trim();


const esContinuidad =

tecnicoRecibe ===
String(usuario.codigo).trim();


const estaEnEjecucion =

normalizar(estado) ===
"en ejecucion";


const div =
document.createElement("div");

div.className = "item";


let controles = "";


if(!estaEnEjecucion){

controles = `

<button
id="btn_ini_${clave}"
onclick="iniciarPreventivo(
'${id}',
'${orden}',
'${clave}'
)"
>

INICIAR PREVENTIVO

</button>

`;

}
else{


let avisoContinuidad = "";


if(esContinuidad){

avisoContinuidad = `

<div class="badge">

🔄 PREVENTIVO RECIBIDO PARA CONTINUIDAD

<br><br>

Trabajo pendiente:<br>

${obtenerCampo(p,"TrabajoPendiente") ||
"Sin descripción"}

</div>

`;

}


controles = `

${avisoContinuidad}


<label>
Tiempo utilizado en esta intervención (min)
</label>

<input
id="tiempo_prev_${clave}"
type="number"
min="1"
step="1"
placeholder="Ej: 60"
>


<label>
Trabajo realizado
</label>

<textarea
id="trabajo_prev_${clave}"
placeholder="Describa el trabajo realizado..."
></textarea>


<label>
Observaciones
</label>

<textarea
id="obs_prev_${clave}"
placeholder="Observaciones adicionales..."
></textarea>


<div class="separador"></div>


<label>
¿Actividad terminada?
</label>

<select
id="actividad_terminada_${clave}"
onchange="cambiarActividadTerminada('${clave}')"
>

<option value="Sí">
Sí
</option>

<option value="No">
No
</option>

</select>


<div
id="bloque_entrega_${clave}"
class="bloque-condicional"
>


<label>
Técnico que recibe
</label>

<select
id="tecnico_recibe_${clave}"
>

${opcionesTecnicos()}

</select>


<label>
Trabajo pendiente por realizar
</label>

<textarea
id="trabajo_pendiente_${clave}"
placeholder="Describa claramente qué trabajo queda pendiente..."
></textarea>


</div>


<div class="separador"></div>


<label>
¿Trabajó con un compañero?
</label>

<select
id="con_companero_${clave}"
onchange="cambiarCompanero('${clave}')"
>

<option value="No">
No
</option>

<option value="Sí">
Sí
</option>

</select>


<div
id="bloque_companero_${clave}"
class="bloque-condicional"
>


<label>
Seleccione el compañero
</label>

<select
id="tecnico_companero_${clave}"
>

${opcionesTecnicos()}

</select>


</div>


<button
id="btn_cerrar_prev_${clave}"
onclick="cerrarPreventivo(
'${id}',
'${orden}',
'${clave}'
)"
>

GUARDAR INTERVENCIÓN

</button>

`;

}


div.innerHTML = `

<div class="titulo">
🗓 Preventivo
</div>


<div class="estado">
${estado || "Asignado"}
</div>


<div class="detalle">
<strong>Orden SAP:</strong>
${orden || "Sin orden"}
</div>


<div class="detalle">
<strong>Fecha inicio:</strong>
${formatearFecha(fechaInicio)}
</div>


<div class="detalle">
<strong>Fecha fin:</strong>
${formatearFecha(fechaFin)}
</div>


<div class="detalle">
<strong>Área:</strong>
${area || "Sin área"}
</div>


<div class="detalle">
<strong>Línea:</strong>
${linea || "Sin línea"}
</div>


<div class="detalle">
<strong>Equipo:</strong>
${equipo || "Sin equipo"}
</div>


<div class="detalle">
<strong>Denominación equipo:</strong>
${denominacionEquipo || ""}
</div>


<div class="detalle">
<strong>Denominación técnica:</strong>
${denominacionTecnica || ""}
</div>


<div class="badge">

Actividad:<br>

${actividad ||
"Sin actividad definida"}

</div>


${controles}

`;


return div;

}

// =====================================================
// TARJETA APOYO COMO COMPAÑERO
// =====================================================

obtenerCampo(p,"ID_Preventivo");

obtenerCampo(p,"Orden");

clavePreventivo(p);

obtenerCampo(p,"Area");

</div>

</div>

</div>

</div>

// =====================================================
// INICIAR PREVENTIVO
// =====================================================


async function iniciarPreventivo(
id,
orden,
clave
){

const btn =
document.getElementById(
"btn_ini_" + clave
);


const confirmar =
confirm(
"¿Confirma iniciar este preventivo?"
);


if(!confirmar) return;


btn.disabled = true;

btn.innerText =
"INICIANDO...";


try{


const datos = {

accion:
"iniciar_preventivo",

ID_Preventivo:
id,

Orden:
orden,

TecnicoEjecutor:
usuario.codigo,

NombreTecnicoEjecutor:
usuario.nombre

};


const params =
new URLSearchParams(datos);


const respuesta =
await fetch(
URL_API +
"?" +
params.toString()
);


const resultado =
await respuesta.json();


if(resultado.ok){

alert(
"Preventivo iniciado correctamente."
);

cargarPendientes();

}
else{

alert(
"Error: " +
resultado.mensaje
);

btn.disabled = false;

btn.innerText =
"INICIAR PREVENTIVO";

}


}
catch(error){

alert(
"Error iniciando preventivo: " +
error
);

btn.disabled = false;

btn.innerText =
"INICIAR PREVENTIVO";

}

}


// =====================================================
// CERRAR / ENTREGAR PREVENTIVO
// =====================================================


async function cerrarPreventivo(
id,
orden,
clave
){

const tiempo =
document.getElementById(
"tiempo_prev_" + clave
).value.trim();


const trabajo =
document.getElementById(
"trabajo_prev_" + clave
).value.trim();


const obs =
document.getElementById(
"obs_prev_" + clave
).value.trim();


const actividadTerminada =
document.getElementById(
"actividad_terminada_" + clave
).value;


const realizadoConCompanero =
document.getElementById(
"con_companero_" + clave
).value;


let tecnicoRecibe = "";

let nombreTecnicoRecibe = "";

let trabajoPendiente = "";

let tecnicoCompanero = "";

let nombreTecnicoCompanero = "";


// -----------------------------------------------------
// VALIDAR TIEMPO
// -----------------------------------------------------


if(!tiempo || Number(tiempo) <= 0){

alert(
"Debe ingresar el tiempo utilizado en minutos."
);

return;

}


// -----------------------------------------------------
// VALIDAR TRABAJO
// -----------------------------------------------------


if(!trabajo){

alert(
"Debe escribir el trabajo realizado."
);

return;

}


// -----------------------------------------------------
// DATOS DE ENTREGA
// -----------------------------------------------------


if(actividadTerminada === "No"){

const selectRecibe =
document.getElementById(
"tecnico_recibe_" + clave
);


tecnicoRecibe =
selectRecibe.value;


if(selectRecibe.selectedIndex > 0){

nombreTecnicoRecibe =
selectRecibe.options[
selectRecibe.selectedIndex
].dataset.nombre || "";

}


trabajoPendiente =
document.getElementById(
"trabajo_pendiente_" + clave
).value.trim();


if(!tecnicoRecibe){

alert(
"Debe seleccionar el técnico que recibe la actividad."
);

return;

}


if(!trabajoPendiente){

alert(
"Debe describir el trabajo pendiente por realizar."
);

return;

}

}


// -----------------------------------------------------
// DATOS DEL COMPAÑERO
// -----------------------------------------------------


if(realizadoConCompanero === "Sí"){

const selectCompanero =
document.getElementById(
"tecnico_companero_" + clave
);


tecnicoCompanero =
selectCompanero.value;


if(selectCompanero.selectedIndex > 0){

nombreTecnicoCompanero =
selectCompanero.options[
selectCompanero.selectedIndex
].dataset.nombre || "";

}


if(!tecnicoCompanero){

alert(
"Debe seleccionar el compañero que participó en la actividad."
);

return;

}

}


// -----------------------------------------------------
// CONFIRMACIÓN
// -----------------------------------------------------


let mensajeConfirmacion = "";


if(actividadTerminada === "No"){

mensajeConfirmacion =

"¿Confirma guardar la intervención y entregar el preventivo a " +

nombreTecnicoRecibe +

"?";

}
else{

mensajeConfirmacion =

"¿Confirma finalizar este preventivo?";

}


const confirmar =
confirm(mensajeConfirmacion);


if(!confirmar) return;


// -----------------------------------------------------
// DESACTIVAR BOTÓN
// -----------------------------------------------------


const btn =
document.getElementById(
"btn_cerrar_prev_" + clave
);


btn.disabled = true;

btn.innerText =
"GUARDANDO...";


try{


const datos = {

accion:
"cerrar_preventivo",

ID_Preventivo:
id,

Orden:
orden,

TrabajoRealizado:
trabajo,

Observaciones:
obs,

TiempoEjecucionMin:
tiempo,

TecnicoEjecutor:
usuario.codigo,

NombreTecnicoEjecutor:
usuario.nombre,

ActividadTerminada:
actividadTerminada,

TecnicoRecibe:
tecnicoRecibe,

NombreTecnicoRecibe:
nombreTecnicoRecibe,

TrabajoPendiente:
trabajoPendiente,

RealizadoConCompanero:
realizadoConCompanero,

TecnicoCompanero:
tecnicoCompanero,

NombreTecnicoCompanero:
nombreTecnicoCompanero

};


const params =
new URLSearchParams(datos);


const respuesta =
await fetch(
URL_API +
"?" +
params.toString()
);


const resultado =
await respuesta.json();


if(resultado.ok){


if(actividadTerminada === "No"){

alert(
"Intervención guardada y preventivo entregado correctamente."
);

}
else if(realizadoConCompanero === "Sí"){

alert(
"Preventivo cerrado. El compañero quedó registrado en la actividad."
);

}
else{

alert(
"Preventivo cerrado correctamente."
);

}


cargarPendientes();


}
else{

alert(
"Error: " +
resultado.mensaje
);

btn.disabled = false;

btn.innerText =
"GUARDAR INTERVENCIÓN";

}


}
catch(error){

alert(
"Error guardando preventivo: " +
error
);

btn.disabled = false;

btn.innerText =
"GUARDAR INTERVENCIÓN";

}

}

// =====================================================
// REGISTRAR TIEMPO DEL COMPAÑERO
// =====================================================


async function registrarTiempoCompanero(
id,
orden,
clave
){

const tiempo =
document.getElementById(
"tiempo_comp_" + clave
).value.trim();


const obs =
document.getElementById(
"obs_comp_" + clave
).value.trim();


const btn =
document.getElementById(
"btn_comp_" + clave
);


// -----------------------------------------------------
// VALIDAR TIEMPO
// -----------------------------------------------------


if(!tiempo || Number(tiempo) <= 0){

alert(
"Debe ingresar el tiempo de apoyo en minutos."
);

return;

}


// -----------------------------------------------------
// CONFIRMACIÓN
// -----------------------------------------------------


const confirmar =
confirm(
"¿Confirma registrar su tiempo de apoyo?"
);


if(!confirmar) return;


// -----------------------------------------------------
// DESACTIVAR BOTÓN
// -----------------------------------------------------


btn.disabled = true;

btn.innerText =
"REGISTRANDO...";


try{


const datos = {

accion:
"registrar_tiempo_companero",

ID_Preventivo:
id,

Orden:
orden,

TiempoCompanero:
tiempo,

ObservacionCompanero:
obs,

TecnicoCompanero:
usuario.codigo,

NombreTecnicoCompanero:
usuario.nombre

};


const params =
new URLSearchParams(datos);


const respuesta =
await fetch(
URL_API +
"?" +
params.toString()
);


const resultado =
await respuesta.json();


if(resultado.ok){

alert(
"Tiempo de apoyo registrado correctamente."
);

cargarPendientes();

}
else{

alert(
"Error: " +
resultado.mensaje
);

btn.disabled = false;

btn.innerText =
"REGISTRAR MI TIEMPO";

}


}
catch(error){

alert(
"Error registrando tiempo de apoyo: " +
error
);

btn.disabled = false;

btn.innerText =
"REGISTRAR MI TIEMPO";

}

}
// =====================================================
// CERRAR PENDIENTE CORRECTIVO
// =====================================================


async function cerrarPendiente(id){

const obs =
document.getElementById(
"obs_" + id
).value.trim();


const tiempo =
document.getElementById(
"tiempo_" + id
).value.trim();


const btn =
document.getElementById(
"btn_" + id
);


if(!tiempo || Number(tiempo) <= 0){

alert(
"Debe ingresar el tiempo utilizado para terminar en minutos."
);

return;

}


if(!obs){

alert(
"Debe escribir una observación de cierre."
);

return;

}


const confirmar =
confirm(
"¿Confirma que este pendiente ya fue finalizado?"
);


if(!confirmar) return;


btn.disabled = true;

btn.innerText =
"CERRANDO...";


try{


const datos = {

accion:
"cerrar_pendiente",

ID_Notificacion:
id,

ObservacionCierre:
obs,

TiempoCierrePendiente:
tiempo,

TecnicoCierre:
usuario.codigo,

NombreTecnicoCierre:
usuario.nombre

};


const params =
new URLSearchParams(datos);


const respuesta =
await fetch(
URL_API +
"?" +
params.toString()
);


const resultado =
await respuesta.json();


if(resultado.ok){

alert(
"Pendiente cerrado correctamente. Tiempo total: " +
resultado.tiempoTotalIntervencion +
" min"
);

cargarPendientes();

}
else{

alert(
"Error: " +
resultado.mensaje
);

btn.disabled = false;

btn.innerText =
"FINALIZAR PENDIENTE";

}


}
catch(error){

alert(
"Error cerrando pendiente: " +
error
);

btn.disabled = false;

btn.innerText =
"FINALIZAR PENDIENTE";

}

}


// =====================================================
// INICIO
// =====================================================


cargarPendientes();

</script>
