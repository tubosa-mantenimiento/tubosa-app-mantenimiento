<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TUBOSA Mantenimiento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#001F5B;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:90%;
max-width:400px;
text-align:center;
}

.logo{
font-size:60px;
font-weight:bold;
margin-bottom:10px;
}

.subtitulo{
font-size:18px;
letter-spacing:2px;
margin-bottom:60px;
}

.pin{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:40px;
}

.pin input{
width:60px;
height:60px;
font-size:24px;
text-align:center;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:white;
color:#001F5B;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.version{
margin-top:40px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
TUBOSA
</div>

<div class="subtitulo">
SISTEMA DE MANTENIMIENTO
</div>

<div class="pin">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button>
INGRESAR
</button>

<div class="version">
Versión 1.0
</div>

</div>

</body>
</html>
