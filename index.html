<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUBOSA Mantenimiento</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(rgba(0,31,91,.92), rgba(0,31,91,.98)),
url('https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=1200&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:100%;
max-width:430px;
min-height:100vh;
padding:40px 28px 25px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
}

.top{
text-align:center;
margin-top:40px;
}

.logo{
font-size:58px;
font-weight:900;
letter-spacing:1px;
}

.subtitulo{
font-size:18px;
letter-spacing:3px;
margin-top:12px;
opacity:.95;
}

.worker{
margin-top:55px;
margin-bottom:40px;
display:flex;
justify-content:center;
align-items:center;
opacity:.95;
}

.login-area{
width:100%;
text-align:center;
}

.login-title{
font-size:24px;
font-weight:bold;
margin-bottom:25px;
}

.pin{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:40px;
}

.pin input{
width:68px;
height:68px;
border-radius:12px;
border:1px solid rgba(255,255,255,.35);
background:rgba(0,20,70,.45);
color:white;
font-size:30px;
text-align:center;
outline:none;
}

.pin input:focus{
border:2px solid white;
}

button{
width:100%;
height:70px;
border:none;
border-radius:14px;
background:white;
color:#001f5b;
font-size:24px;
font-weight:900;
letter-spacing:.5px;
box-shadow:0 10px 20px rgba(0,0,0,.25);
cursor:pointer;
}

.version{
font-size:16px;
opacity:.75;
text-align:center;
margin-bottom:15px;
}

@media (min-width:700px){
.container{
max-width:460px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<div class="logo">TUBOSA</div>
<div class="subtitulo">SISTEMA DE MANTENIMIENTO</div>
<div class="worker">

<svg width="140" height="140" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">

<path d="M42 46V40C42 28 52 20 64 20C76 20 86 28 86 40V46"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

<path d="M38 46H90V58H38V46Z"
stroke="white"
stroke-width="4"
stroke-linejoin="round"/>

<circle cx="64" cy="72" r="18"
stroke="white"
stroke-width="4"/>

<path d="M46 102C52 92 76 92 82 102"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

<path d="M88 78L108 98"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

<path d="M101 91L112 80"
stroke="white"
stroke-width="4"
stroke-linecap="round"/>

</svg>

</div>
</div>

<div class="login-area">
<div class="login-title">Ingrese su PIN</div>

<div class="pin">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
</div>

<button onclick="window.location.href='menu.html'">
INGRESAR
</button>
</div>

<div class="version">Versión 1.0</div>

</div>

<script>
const inputs = document.querySelectorAll('.pin input');

inputs.forEach((input, index) => {
input.addEventListener('input', () => {
if(input.value.length === 1 && index < inputs.length - 1){
inputs[index + 1].focus();
}
});

input.addEventListener('keydown', (e) => {
if(e.key === 'Backspace' && input.value === '' && index > 0){
inputs[index - 1].focus();
}
});
});
</script>

</body>
</html>
