<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Ejecuciones - TUBOSA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:18px;}
.container{max-width:520px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.logo{font-size:34px;font-weight:900;}
.back{color:white;text-decoration:none;font-size:32px;}
.card{background:#0b3475;border-radius:22px;padding:20px;border:1px solid rgba(255,255,255,.15);margin-bottom:18px;}
h1{font-size:26px;margin-bottom:8px;}
.subtitle{opacity:.85;font-size:15px;margin-bottom:20px;}
label{display:block;margin-top:15px;margin-bottom:6px;font-weight:bold;font-size:15px;}
input,select,textarea{width:100%;padding:15px;border-radius:14px;border:none;outline:none;font-size:16px;background:white;color:#001f5b;}
textarea{min-height:95px;resize:vertical;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.readonly{background:#dbe4f5;}
button{width:100%;padding:18px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:21px;font-weight:900;margin-top:20px;cursor:pointer;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:20px;}
</style>
</head>

<body>
<div class="container">

<div class="header">
<a class="back" href="mis-actividades.html">‹</a>
<div class="logo">TUBOSA</div>
<div style="width:32px;"></div>
</div>

<div class="card">
<h1>Registrar Ejecución</h1>
<div class="subtitle">Registro de tiempo real para SAP PM e ISO 9001</div>

<div class="grid">
<div>
<label>Orden SAP</label>
<input id="ordenSAP" value="40010002">
</div>
<div>
<label>Operación</label>
<input id="operacion" value="0010">
</div>
</div>

<label>Actividad</label>
<input id="actividad" class="readonly" value="PM Compresor CSD75" readonly>

<label>Equipo</label>
<input id="equipo" class="readonly" value="Compresor Kaeser CSD75" readonly>

<div class="grid">
<div>
<label>Hora inicio</label>
<input id="horaInicio" type="time" onchange="calcularTrabajoReal()">
</div>
<div>
<label>Hora fin</label>
<input id="horaFin" type="time" onchange="calcularTrabajoReal()">
</div>
</div>

<div class="grid">
<div>
<label>Trabajo real</label>
<input id="trabajoReal" class="readonly" readonly placeholder="0.00">
</div>
<div>
<label>Unidad</label>
<input id="unidad" class="readonly" value="H" readonly>
</div>
</div>

<label>Actividad terminada</label>
<select id="actividadTerminada">
<option value="">Seleccione...</option>
<option>Sí</option>
<option>No</option>
</select>

<label>Observaciones</label>
<textarea id="observaciones" placeholder="Describa el trabajo realizado, hallazgos o pendientes..."></textarea>

<button onclick="guardarEjecucion()">GUARDAR EJECUCIÓN</button>
</div>

<div class="footer">
TUBOSA - Sistema de Mantenimiento<br>
Versión 1.0
</div>

</div>

<script>
function calcularTrabajoReal(){
const inicio = document.getElementById("horaInicio").value;
const fin = document.getElementById("horaFin").value;

if(!inicio || !fin){
return;
}

const [hi, mi] = inicio.split(":").map(Number);
const [hf, mf] = fin.split(":").map(Number);

let inicioMin = hi * 60 + mi;
let finMin = hf * 60 + mf;

if(finMin < inicioMin){
finMin += 24 * 60;
}

const diferenciaHoras = (finMin - inicioMin) / 60;
document.getElementById("trabajoReal").value = diferenciaHoras.toFixed(2);
}

function guardarEjecucion(){
const terminada = document.getElementById("actividadTerminada").value;
const trabajoReal = document.getElementById("trabajoReal").value;

if(!trabajoReal){
alert("Debe ingresar hora inicio y hora fin.");
return;
}

if(!terminada){
alert("Debe indicar si la actividad terminó.");
return;
}

if(terminada === "Sí"){
alert("Ejecución guardada. Estado: Ejecutada / Pendiente SAP.");
}else{
alert("Ejecución guardada. La actividad queda En ejecución para continuar.");
}

window.location.href = "menu.html";
}
</script>

</body>
</html>
