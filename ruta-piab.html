<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta PIAB - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:16px;}
.container{max-width:620px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.logo{font-size:32px;font-weight:900;}
.back{color:white;text-decoration:none;font-size:32px;}
.card{background:#0b3475;border-radius:20px;padding:18px;border:1px solid rgba(255,255,255,.15);margin-bottom:14px;}
h1{font-size:25px;margin-bottom:6px;}
.subtitle{opacity:.85;font-size:14px;margin-bottom:18px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
label{display:block;font-weight:bold;font-size:14px;margin-bottom:5px;}
input,select,textarea{width:100%;padding:12px;border-radius:12px;border:none;font-size:15px;color:#001f5b;}
textarea{min-height:70px;resize:vertical;}
.readonly{background:#dbe4f5;}
.point-title{font-size:20px;font-weight:900;margin-bottom:12px;}
button{width:100%;padding:17px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:20px;font-weight:900;margin-top:18px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:20px;}
.hidden-field{opacity:.55;}
</style>
</head>

<body>
<div class="container">

<div class="header">
<a class="back" href="rutas.html">‹</a>
<div class="logo">TUBOSA</div>
<div style="width:32px;"></div>
</div>

<div class="card">
<h1>Ruta Bombas PIAB</h1>
<div class="subtitle">Inspección de vacío por punto de extrusora</div>

<div class="grid">
<div>
<label>Fecha</label>
<input id="fecha" class="readonly" readonly>
</div>
<div>
<label>Hora</label>
<input id="hora" class="readonly" readonly>
</div>
</div>

<div class="grid">
<div>
<label>Técnico</label>
<input class="readonly" value="Luis Cambindo" readonly>
</div>
<div>
<label>Turno</label>
<input id="turno" class="readonly" readonly>
</div>
</div>
</div>

<div id="puntos"></div>

<button onclick="guardarRuta()">GUARDAR RUTA PIAB</button>

<div class="footer">
TUBOSA - Sistema de Mantenimiento<br>
Versión 1.0.1
</div>

</div>

<script>
const puntosPIAB = [
"L1",
"L3",
"L4",
"L5",
"L7",
"L8",
"L9",
"L10 - Extrusora 65",
"L10 - Extrusora 80",
"L11",
"L13",
"L14",
"L15",
"L16",
"L18",
"L21"
];

function calcularTurno(){
const h = new Date().getHours();
if(h >= 6 && h < 14) return "Turno A";
if(h >= 14 && h < 22) return "Turno B";
return "Turno C";
}

function cargarFechaHora(){
const ahora = new Date();
document.getElementById("fecha").value = ahora.toLocaleDateString("es-CO");
document.getElementById("hora").value = ahora.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
document.getElementById("turno").value = calcularTurno();
}

function crearPuntos(){
const contenedor = document.getElementById("puntos");

puntosPIAB.forEach((punto, index) => {
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="point-title">${punto}</div>

<div class="grid">
<div>
<label>PIAB instalada</label>
<select id="instalada_${index}" onchange="controlarCampos(${index})">
<option value="">Seleccione...</option>
<option value="SI">SI</option>
<option value="NO">NO</option>
</select>
</div>

<div>
<label>ID PIAB</label>
<input id="idpiab_${index}" placeholder="Ej: L17">
</div>
</div>

<div class="grid">
<div>
<label>Vacío</label>
<input id="vacio_${index}" placeholder="Ej: 18 inHg">
</div>

<div>
<label>Estado</label>
<select id="estado_${index}">
<option>OK</option>
<option>BAJO VACÍO</option>
<option>NO APLICA</option>
</select>
</div>
</div>

<label>Observación</label>
<textarea id="obs_${index}" placeholder="Observación del punto inspeccionado"></textarea>
`;

contenedor.appendChild(card);
});
}

function controlarCampos(index){
const instalada = document.getElementById(`instalada_${index}`).value;
const idpiab = document.getElementById(`idpiab_${index}`);
const vacio = document.getElementById(`vacio_${index}`);
const estado = document.getElementById(`estado_${index}`);

if(instalada === "NO"){
idpiab.value = "N/A";
vacio.value = "N/A";
estado.value = "NO APLICA";
idpiab.disabled = true;
vacio.disabled = true;
estado.disabled = true;
}

if(instalada === "SI"){
idpiab.disabled = false;
vacio.disabled = false;
estado.disabled = false;
if(idpiab.value === "N/A") idpiab.value = "";
if(vacio.value === "N/A") vacio.value = "";
estado.value = "OK";
}
}

function guardarRuta(){
alert("Ruta PIAB guardada correctamente. En la siguiente fase se enviará a Google Sheets.");
window.location.href = "rutas.html";
}

cargarFechaHora();
crearPuntos();
</script>

</body>
</html>
