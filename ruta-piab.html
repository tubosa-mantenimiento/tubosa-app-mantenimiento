<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta PIAB - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:22px;}
.container{max-width:620px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.back{color:white;text-decoration:none;font-size:42px;font-weight:bold;}
.logo{font-size:46px;font-weight:900;}
.card{background:#0b3475;border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;margin-bottom:18px;}
.line-card{background:#123f86;border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:18px;margin-top:18px;}
.line-title{font-size:24px;font-weight:900;margin-bottom:6px;}
.line-subtitle{font-size:15px;opacity:.85;margin-bottom:14px;}
h1{font-size:30px;margin-bottom:8px;}
.subtitle{font-size:17px;opacity:.85;margin-bottom:20px;}
label{display:block;font-weight:bold;font-size:17px;margin-top:16px;margin-bottom:7px;}
input,select,textarea{width:100%;padding:16px;border:none;border-radius:15px;font-size:17px;color:#001f5b;}
textarea{min-height:85px;resize:vertical;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.readonly{background:#dbe4f5;}
button{width:100%;padding:19px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:21px;font-weight:900;margin-top:22px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:24px;}
.aviso{background:#eaf0ff;color:#001f5b;padding:14px;border-radius:16px;font-size:15px;margin-top:12px;font-weight:bold;}
.info-linea{background:#eaf0ff;color:#001f5b;padding:12px;border-radius:14px;font-size:14px;margin-top:12px;font-weight:bold;}
.normal{border:2px solid #2ecc71;}
.fuera{border:2px solid #f39c12;}
.disabled{background:#dbe4f5!important;color:#777!important;}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <a class="back" href="rutas.html">‹</a>
    <div class="logo">TUBOSA</div>
    <div style="width:42px;"></div>
  </div>

  <div class="card">
    <h1>Bombas PIAB</h1>
    <div class="subtitle">Inspección de vacío e inventario de bombas PIAB</div>

    <div class="grid">
      <div>
        <label>Fecha</label>
        <input id="fecha" class="readonly" readonly>
      </div>
      <div>
        <label>Hora</label>
        <input id="hora" class="readonly" readonly>
      </div>
    </div>

    <label>Técnico</label>
    <input id="tecnico" class="readonly" readonly>

    <label>Turno</label>
    <input id="turno" class="readonly" readonly>

    <div class="aviso">
      Ahora se registra el inventario de bomba PIAB instalada, aunque la línea no esté trabajando.
    </div>
  </div>

  <div id="contenedorLineas"></div>

  <button id="btnGuardar" onclick="guardarPIAB()">GUARDAR RUTA PIAB</button>

  <div class="footer">
    TUBOSA - Sistema de Mantenimiento<br>
    Versión 1.0
  </div>

</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbzeqAn-7ljMVh6lWLY2EsbQUyPIfXPGiQi8DGhMaULr8smReTfUm2BzGgXFFoPyJdI5DA/exec";

const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!usuario){
  window.location.href = "index.html";
}

const puntosPIAB = [
  { linea:"Línea 4",  punto:"PIAB Línea 4" },
  { linea:"Línea 5",  punto:"PIAB Línea 5" },
  { linea:"Línea 7",  punto:"PIAB Línea 7" },
  { linea:"Línea 9",  punto:"PIAB Línea 9" },
  { linea:"Línea 10", punto:"PIAB Línea 10 EXT 65" },
  { linea:"Línea 10", punto:"PIAB Línea 10 EXT 88" },
  { linea:"Línea 11", punto:"PIAB Línea 11" },
  { linea:"Línea 13", punto:"PIAB Línea 13" },
  { linea:"Línea 14", punto:"PIAB Línea 14" },
  { linea:"Línea 15", punto:"PIAB Línea 15" },
  { linea:"Línea 16", punto:"PIAB Línea 16" },
  { linea:"Línea 17", punto:"PIAB Línea 16" },
  { linea:"Línea 18", punto:"PIAB Línea 18" },
  { linea:"Línea 19", punto:"PIAB Línea 19" },
  { linea:"Línea 20", punto:"PIAB Línea 20" },
  { linea:"Línea 21", punto:"PIAB Línea 21" }
];

function determinarTurno(){
  const hora = new Date().getHours();

  if(hora >= 6 && hora < 14){
    return "Turno A - 6:00 am - 2:00 pm";
  }

  if(hora >= 14 && hora < 22){
    return "Turno B - 2:00 pm - 10:00 pm";
  }

  return "Turno C - 10:00 pm - 6:00 am";
}

function cargarInicial(){
  const ahora = new Date();

  document.getElementById("fecha").value = ahora.toLocaleDateString("es-CO");
  document.getElementById("hora").value = ahora.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("tecnico").value = usuario.nombre;
  document.getElementById("turno").value = usuario.turno || determinarTurno();

  construirFormularioLineas();
}

function limpiarID(texto){
  return texto
    .replaceAll(" ","_")
    .replaceAll("Í","I")
    .replaceAll("í","i")
    .replaceAll("É","E")
    .replaceAll("é","e");
}

function construirFormularioLineas(){
  const contenedor = document.getElementById("contenedorLineas");
  contenedor.innerHTML = "";

  puntosPIAB.forEach(item => {
    const id = limpiarID(item.punto);

    const html = `
      <div class="line-card" id="card_${id}">
        <div class="line-title">${item.punto}</div>
        <div class="line-subtitle">Inspección bomba PIAB / vacío de material</div>

        <label>Estado de la línea</label>
        <select id="estadoLinea_${id}" onchange="controlarCamposPIAB('${id}')">
          <option value="">Seleccione...</option>
          <option value="En trabajo">En trabajo</option>
          <option value="Fuera de servicio">Fuera de servicio</option>
        </select>

        <label>Bomba PIAB instalada</label>
        <select id="bombaInstalada_${id}" onchange="controlarCamposPIAB('${id}')">
          <option value="">Seleccione...</option>
          <option>Sí</option>
          <option>No</option>
        </select>

        <div class="grid">
          <div>
            <label>Vacío PIAB</label>
            <input id="vacioPIAB_${id}" type="number" step="0.01" placeholder="Ej: -0.65">
          </div>
          <div>
            <label>Unidad</label>
            <select id="unidadVacio_${id}">
              <option value="">Seleccione...</option>
              <option>bar</option>
              <option>inHg</option>
              <option>mmHg</option>
              <option>kPa</option>
            </select>
          </div>
        </div>

        <div class="info-linea" id="info_${id}">
          Seleccione el estado de la línea y si la bomba PIAB está instalada.
        </div>

        <label>Observaciones</label>
        <textarea id="observaciones_${id}" placeholder="Ingrese fugas, filtros, mangueras, cambio de molde o novedades..."></textarea>
      </div>
    `;

    contenedor.insertAdjacentHTML("beforeend", html);
    controlarCamposPIAB(id);
  });
}

function controlarCamposPIAB(id){
  const estadoLinea = document.getElementById("estadoLinea_" + id).value;
  const instalada = document.getElementById("bombaInstalada_" + id).value;
  const vacio = document.getElementById("vacioPIAB_" + id);
  const unidad = document.getElementById("unidadVacio_" + id);
  const info = document.getElementById("info_" + id);
  const card = document.getElementById("card_" + id);

  card.classList.remove("normal");
  card.classList.remove("fuera");

  if(estadoLinea === "En trabajo" && instalada === "Sí"){
    vacio.disabled = false;
    unidad.disabled = false;
    vacio.classList.remove("disabled");
    unidad.classList.remove("disabled");
    card.classList.add("normal");
    info.innerText = "Línea en trabajo. Registre el valor de vacío PIAB.";
    return;
  }

  vacio.value = "";
  unidad.value = "";
  vacio.disabled = true;
  unidad.disabled = true;
  vacio.classList.add("disabled");
  unidad.classList.add("disabled");

  if(estadoLinea === "Fuera de servicio"){
    card.classList.add("fuera");
    info.innerText = "Línea fuera de servicio. Solo se registra inventario de bomba PIAB instalada.";
    return;
  }

  if(instalada === "No"){
    info.innerText = "No hay bomba PIAB instalada. Se guarda como inventario, no requiere vacío.";
    return;
  }

  info.innerText = "Seleccione el estado de la línea y si la bomba PIAB está instalada.";
}

function validarFormulario(){
  for(const item of puntosPIAB){
    const id = limpiarID(item.punto);
    const estadoLinea = document.getElementById("estadoLinea_" + id).value;
    const bombaInstalada = document.getElementById("bombaInstalada_" + id).value;
    const vacio = document.getElementById("vacioPIAB_" + id).value;
    const unidad = document.getElementById("unidadVacio_" + id).value;

    if(!estadoLinea){
      alert("Debe seleccionar el estado de la línea en " + item.punto + ".");
      return false;
    }

    if(!bombaInstalada){
      alert("Debe seleccionar si la bomba PIAB está instalada en " + item.punto + ".");
      return false;
    }

    if(estadoLinea === "En trabajo" && bombaInstalada === "Sí" && (!vacio || !unidad)){
      alert(item.punto + " está en trabajo y tiene PIAB instalada. Debe registrar vacío y unidad.");
      return false;
    }
  }

  return true;
}

async function guardarPIAB(){

  if(!validarFormulario()){
    return;
  }

  const btn = document.getElementById("btnGuardar");
  btn.disabled = true;
  btn.innerText = "GUARDANDO RUTA...";

  try{
    for(const item of puntosPIAB){

      const id = limpiarID(item.punto);

      const datos = {
        hoja: "Rutas_PIAB",
        ID: "PIAB-" + id + "-" + Date.now(),
        Fecha: document.getElementById("fecha").value,
        Hora: document.getElementById("hora").value,
        Tecnico: usuario.codigo,
        NombreTecnico: usuario.nombre,
        Turno: document.getElementById("turno").value,
        Linea: item.linea,
        PuntoInspeccion: item.punto,
        Extrusora: "",
        EstadoLinea: document.getElementById("estadoLinea_" + id).value,
        BombaInstalada: document.getElementById("bombaInstalada_" + id).value,
        VacioPIAB: document.getElementById("vacioPIAB_" + id).value,
        UnidadVacio: document.getElementById("unidadVacio_" + id).value,
        Observaciones: document.getElementById("observaciones_" + id).value,
        Estado: "Registrado"
      };

      const params = new URLSearchParams(datos);
      const respuesta = await fetch(URL_API + "?" + params.toString());
      const resultado = await respuesta.json();

      if(!resultado.ok){
        throw new Error(resultado.mensaje || "Error guardando " + item.punto);
      }
    }

    alert("Ruta PIAB guardada correctamente.");
    window.location.href = "rutas.html";

  }catch(error){
    alert("Error guardando Ruta PIAB: " + error);
    btn.disabled = false;
    btn.innerText = "GUARDAR RUTA PIAB";
  }
}

cargarInicial();
</script>

</body>
</html>
