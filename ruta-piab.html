<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta PIAB - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:22px;}
.container{max-width:620px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.back{color:white;text-decoration:none;font-size:42px;font-weight:bold;}
.logo{font-size:46px;font-weight:900;}
.card{background:#0b3475;border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;margin-bottom:18px;}
.line-card{background:#123f86;border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:18px;margin-top:18px;}
.line-title{font-size:22px;font-weight:900;margin-bottom:6px;}
.line-subtitle{font-size:14px;opacity:.8;margin-bottom:14px;}
h1{font-size:30px;margin-bottom:8px;}
.subtitle{font-size:17px;opacity:.85;margin-bottom:20px;}
label{display:block;font-weight:bold;font-size:17px;margin-top:16px;margin-bottom:7px;}
input,select,textarea{width:100%;padding:16px;border:none;border-radius:15px;font-size:17px;color:#001f5b;}
textarea{min-height:85px;resize:vertical;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.readonly{background:#dbe4f5;}
button{width:100%;padding:19px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:21px;font-weight:900;margin-top:22px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:24px;}
.aviso{background:#eaf0ff;color:#001f5b;padding:14px;border-radius:16px;font-size:15px;margin-top:12px;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <a class="back" href="rutas.html">‹</a>
    <div class="logo">TUBOSA</div>
    <div style="width:42px;"></div>
  </div>

  <div class="card">
    <h1>Bombas PIAB</h1>
    <div class="subtitle">Inspección de vacío para las 21 líneas de extrusión</div>

    <div class="grid">
      <div>
        <label>Fecha</label>
        <input id="fecha" class="readonly" readonly>
      </div>
      <div>
        <label>Hora</label>
        <input id="hora" class="readonly" readonly>
      </div>
    </div>

    <label>Técnico</label>
    <input id="tecnico" class="readonly" readonly>

    <label>Turno</label>
    <input id="turno" class="readonly" readonly>

    <div class="aviso">
      Diligencie cada línea. Si la línea no tiene bomba PIAB instalada, seleccione “No”.
    </div>
  </div>

  <div id="contenedorLineas"></div>

  <button id="btnGuardar" onclick="guardarPIAB()">GUARDAR RUTA PIAB</button>

  <div class="footer">
    TUBOSA - Sistema de Mantenimiento<br>
    Versión 1.0
  </div>

</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbzeqAn-7ljMVh6lWLY2EsbQUyPIfXPGiQi8DGhMaULr8smReTfUm2BzGgXFFoPyJdI5DA/exec";

const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!usuario){
  window.location.href = "index.html";
}

let equiposBD = [];

const lineasProduccion = [
  "L1","L2","L3","L4","L5","L6","L7",
  "L8","L9","L10","L11","L12","L13","L14",
  "L15","L16","L17","L18","L19","L20","L21"
];

function determinarTurno(){
  const hora = new Date().getHours();

  if(hora >= 6 && hora < 14){
    return "Turno A - 6:00 am - 2:00 pm";
  }

  if(hora >= 14 && hora < 22){
    return "Turno B - 2:00 pm - 10:00 pm";
  }

  return "Turno C - 10:00 pm - 6:00 am";
}

function cargarInicial(){
  const ahora = new Date();

  document.getElementById("fecha").value = ahora.toLocaleDateString("es-CO");
  document.getElementById("hora").value = ahora.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("tecnico").value = usuario.nombre;
  document.getElementById("turno").value = usuario.turno || determinarTurno();
}

async function cargarEquipos(){
  try{
    const respuesta = await fetch(URL_API + "?accion=listar&hoja=Equipos");
    const data = await respuesta.json();

    equiposBD = data.datos || [];
    construirFormularioLineas();

  }catch(error){
    alert("Error cargando equipos: " + error);
    construirFormularioLineas();
  }
}

function construirFormularioLineas(){
  const contenedor = document.getElementById("contenedorLineas");
  contenedor.innerHTML = "";

  lineasProduccion.forEach(linea => {
    const extrusoras = obtenerExtrusorasPorLinea(linea);

    let opcionesExtrusoras = '<option value="">Seleccione...</option>';

    if(extrusoras.length > 0){
      extrusoras.forEach(eq => {
        opcionesExtrusoras += `<option value="${eq.NombreEquipo}">${eq.NombreEquipo}</option>`;
      });
    }else{
      opcionesExtrusoras += `<option value="N/A">No encontrada en maestro de equipos</option>`;
    }

    const html = `
      <div class="line-card" id="card_${linea}">
        <div class="line-title">${linea}</div>
        <div class="line-subtitle">Inspección bomba PIAB / vacío de material</div>

        <label>Extrusora</label>
        <select id="extrusora_${linea}">
          ${opcionesExtrusoras}
        </select>

        <label>Bomba PIAB instalada</label>
        <select id="bombaInstalada_${linea}" onchange="controlarCamposPIAB('${linea}')">
          <option value="">Seleccione...</option>
          <option>Sí</option>
          <option>No</option>
        </select>

        <div class="grid">
          <div>
            <label>Vacío PIAB</label>
            <input id="vacioPIAB_${linea}" type="number" step="0.01" placeholder="Ej: -0.65">
          </div>
          <div>
            <label>Unidad</label>
            <select id="unidadVacio_${linea}">
              <option value="">Seleccione...</option>
              <option>bar</option>
              <option>inHg</option>
              <option>mmHg</option>
              <option>kPa</option>
            </select>
          </div>
        </div>

        <label>Observaciones</label>
        <textarea id="observaciones_${linea}" placeholder="Ingrese fugas, filtros, mangueras, cambio de molde o novedades..."></textarea>
      </div>
    `;

    contenedor.insertAdjacentHTML("beforeend", html);
  });
}

function obtenerExtrusorasPorLinea(linea){
  return equiposBD.filter(e =>
    String(e.Linea).trim().toUpperCase() === String(linea).trim().toUpperCase() &&
    String(e.NombreEquipo).toLowerCase().includes("extrusora")
  );
}

function controlarCamposPIAB(linea){
  const instalada = document.getElementById("bombaInstalada_" + linea).value;
  const vacio = document.getElementById("vacioPIAB_" + linea);
  const unidad = document.getElementById("unidadVacio_" + linea);

  if(instalada === "No"){
    vacio.value = "";
    unidad.value = "";
    vacio.disabled = true;
    unidad.disabled = true;
  }else{
    vacio.disabled = false;
    unidad.disabled = false;
  }
}

function validarFormulario(){
  for(const linea of lineasProduccion){
    const extrusora = document.getElementById("extrusora_" + linea).value;
    const bombaInstalada = document.getElementById("bombaInstalada_" + linea).value;
    const vacio = document.getElementById("vacioPIAB_" + linea).value;
    const unidad = document.getElementById("unidadVacio_" + linea).value;

    if(!extrusora || !bombaInstalada){
      alert("Debe completar extrusora y bomba PIAB instalada en la línea " + linea + ".");
      return false;
    }

    if(bombaInstalada === "Sí" && (!vacio || !unidad)){
      alert("La línea " + linea + " tiene PIAB instalada. Debe registrar vacío y unidad.");
      return false;
    }
  }

  return true;
}

async function guardarPIAB(){

  if(!validarFormulario()){
    return;
  }

  const btn = document.getElementById("btnGuardar");
  btn.disabled = true;
  btn.innerText = "GUARDANDO RUTA...";

  try{
    for(const linea of lineasProduccion){

      const datos = {
        hoja: "Rutas_PIAB",
        ID: "PIAB-" + linea + "-" + Date.now(),
        Fecha: document.getElementById("fecha").value,
        Hora: document.getElementById("hora").value,
        Tecnico: usuario.codigo,
        NombreTecnico: usuario.nombre,
        Turno: document.getElementById("turno").value,
        Linea: linea,
        Extrusora: document.getElementById("extrusora_" + linea).value,
        BombaInstalada: document.getElementById("bombaInstalada_" + linea).value,
        VacioPIAB: document.getElementById("vacioPIAB_" + linea).value,
        UnidadVacio: document.getElementById("unidadVacio_" + linea).value,
        Observaciones: document.getElementById("observaciones_" + linea).value
      };

      const params = new URLSearchParams(datos);
      const respuesta = await fetch(URL_API + "?" + params.toString());
      const resultado = await respuesta.json();

      if(!resultado.ok){
        throw new Error(resultado.mensaje || "Error guardando línea " + linea);
      }
    }

    alert("Ruta PIAB guardada correctamente para las 21 líneas.");
    window.location.href = "rutas.html";

  }catch(error){
    alert("Error guardando Ruta PIAB: " + error);
    btn.disabled = false;
    btn.innerText = "GUARDAR RUTA PIAB";
  }
}

cargarInicial();
cargarEquipos();
</script>

</body>
</html>
