<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios Industriales - TUBOSA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#001f5b;color:white;min-height:100vh;padding:22px;}
.container{max-width:520px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.back{color:white;text-decoration:none;font-size:42px;font-weight:bold;}
.logo{font-size:46px;font-weight:900;}
.card{background:#0b3475;border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;margin-bottom:18px;}
h1{font-size:30px;margin-bottom:8px;}
h2{font-size:22px;margin:12px 0;}
.subtitle{font-size:17px;opacity:.85;margin-bottom:20px;}
label{display:block;font-weight:bold;font-size:17px;margin-top:16px;margin-bottom:7px;}
input,textarea{width:100%;padding:16px;border:none;border-radius:15px;font-size:17px;color:#001f5b;}
textarea{min-height:100px;resize:vertical;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.readonly{background:#dbe4f5;}
button{width:100%;padding:19px;border:none;border-radius:16px;background:white;color:#001f5b;font-size:21px;font-weight:900;margin-top:20px;}
.footer{text-align:center;opacity:.7;font-size:13px;margin-top:24px;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<a class="back" href="rutas.html">‹</a>
<div class="logo">TUBOSA</div>
<div style="width:42px;"></div>
</div>

<div class="card">
<h1>Servicios Industriales</h1>
<div class="subtitle">Inspección diaria por turno</div>

<div class="grid">
<div>
<label>Fecha</label>
<input id="fecha" class="readonly" readonly>
</div>
<div>
<label>Hora</label>
<input id="hora" class="readonly" readonly>
</div>
</div>

<label>Técnico</label>
<input id="tecnico" class="readonly" readonly>

<label>Turno</label>
<input id="turno" class="readonly" readonly>
</div>

<div class="card">
<h2>⚡ Subestación Eléctrica</h2>

<label>Trafo 2000 KVA Sub Antigua</label>
<input id="trafo2000Antigua" type="number" placeholder="Amperaje">

<label>Trafo 1000 KVA Sub Antigua 1600A</label>
<input id="trafo1000_1600" type="number" placeholder="Amperaje">

<label>Trafo 1000 KVA Sub Antigua 2000A</label>
<input id="trafo1000_2000" type="number" placeholder="Amperaje">

<label>Trafo 2000 KVA Sub Nueva</label>
<input id="trafo2000Nueva" type="number" placeholder="Amperaje">
</div>

<div class="card">
<h2>🌀 Compresores de Aire</h2>

<label>Presión Aire Comprimido SAM</label>
<input id="presionAire" type="number" placeholder="PSI">

<label>Caudal Aire Comprimido</label>
<input id="caudalAire" type="number" placeholder="CFM">
</div>

<div class="card">
<h2>❄️ Sistema Agua Fría</h2>

<label>Presión agua bombas a planta</label>
<input id="presionBombas" type="number" placeholder="PSI">

<label>Temperatura agua salida Chiller</label>
<input id="temperaturaChiller" type="number" placeholder="°F">

<label>% carga compresores Chiller</label>
<input id="cargaCompresores" type="number" placeholder="%">
</div>

<div class="card">
<label>Observaciones</label>
<textarea id="observaciones" placeholder="Ingrese novedades, condiciones anormales o pendientes..."></textarea>

<button id="btnGuardar" onclick="guardarRuta()">GUARDAR RUTA</button>
</div>

<div class="footer">
TUBOSA - Sistema de Mantenimiento<br>
Versión 1.0
</div>

</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbzeqAn-7ljMVh6lWLY2EsbQUyPIfXPGiQi8DGhMaULr8smReTfUm2BzGgXFFoPyJdI5DA/exec";

const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!usuario){
  window.location.href = "index.html";
}

function cargarInicial(){
  const ahora = new Date();

  document.getElementById("fecha").value = ahora.toLocaleDateString("es-CO");
  document.getElementById("hora").value = ahora.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("tecnico").value = usuario.nombre;
  document.getElementById("turno").value = usuario.turno;
}

async function guardarRuta(){

  const btn = document.getElementById("btnGuardar");
  btn.disabled = true;
  btn.innerText = "GUARDANDO...";

  const datos = {
    hoja: "Rutas_Servicios",
    ID_Ruta: "RS-" + Date.now(),
    Fecha: document.getElementById("fecha").value,
    Hora: document.getElementById("hora").value,
    Tecnico: usuario.codigo,
    Turno: document.getElementById("turno").value,
    Amperaje_Trafo2000_Antigua: document.getElementById("trafo2000Antigua").value,
    Amperaje_Trafo1000_1600: document.getElementById("trafo1000_1600").value,
    Amperaje_Trafo1000_2000: document.getElementById("trafo1000_2000").value,
    Amperaje_Trafo2000_Nueva: document.getElementById("trafo2000Nueva").value,
    Presion_Aire_SAM: document.getElementById("presionAire").value,
    Caudal_Aire: document.getElementById("caudalAire").value,
    Presion_Bombas: document.getElementById("presionBombas").value,
    Temperatura_Chiller: document.getElementById("temperaturaChiller").value,
    Carga_Compresores: document.getElementById("cargaCompresores").value,
    Observaciones: document.getElementById("observaciones").value
  };

  try{
    const params = new URLSearchParams(datos);
    const respuesta = await fetch(URL_API + "?" + params.toString());
    const resultado = await respuesta.json();

    if(resultado.ok){
      alert("Ruta de Servicios Industriales guardada correctamente.");
      window.location.href = "rutas.html";
    }else{
      alert("Error: " + resultado.mensaje);
      btn.disabled = false;
      btn.innerText = "GUARDAR RUTA";
    }

  }catch(error){
    alert("Error guardando ruta: " + error);
    btn.disabled = false;
    btn.innerText = "GUARDAR RUTA";
  }
}

cargarInicial();
</script>

</body>
</html>
