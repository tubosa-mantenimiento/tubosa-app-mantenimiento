<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>Centro Visual de Mantenimiento - TUBOSA</title>

<style>

/* =========================================================
   CONFIGURACIÓN GENERAL
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#001f5b;
  color:white;
}

body{
  display:flex;
  flex-direction:column;
}

/* =========================================================
   ENCABEZADO
========================================================= */

.header{
  height:11vh;
  min-height:84px;
  padding:14px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:25px;
  background:#001f5b;
  border-bottom:1px solid rgba(255,255,255,.20);
}

.header-left{
  display:flex;
  align-items:center;
  gap:22px;
  min-width:0;
}

.logo{
  font-size:clamp(34px,3.2vw,58px);
  font-weight:900;
  letter-spacing:1px;
  white-space:nowrap;
}

.header-title{
  border-left:2px solid rgba(255,255,255,.40);
  padding-left:22px;
  min-width:0;
}

.header-title h1{
  font-size:clamp(22px,2.1vw,37px);
  line-height:1.05;
}

.header-title p{
  margin-top:5px;
  font-size:clamp(12px,1vw,17px);
  opacity:.78;
}

.header-right{
  text-align:right;
  white-space:nowrap;
}

.reloj{
  font-size:clamp(28px,2.8vw,48px);
  font-weight:900;
}

.fecha{
  margin-top:3px;
  font-size:clamp(12px,1.1vw,18px);
  opacity:.80;
}

/* =========================================================
   CONTENIDO PRINCIPAL
========================================================= */

.main{
  position:relative;
  flex:1;
  min-height:0;
  padding:18px 26px 14px;
}

.slide{
  position:absolute;
  inset:18px 26px 14px;
  opacity:0;
  visibility:hidden;
  transform:translateX(30px);
  transition:
    opacity .55s ease,
    transform .55s ease,
    visibility .55s;
}

.slide.activo{
  opacity:1;
  visibility:visible;
  transform:translateX(0);
}

.panel{
  height:100%;
  background:#0b3475;
  border:1px solid rgba(255,255,255,.18);
  border-radius:24px;
  padding:18px 22px;
  display:flex;
  flex-direction:column;
  box-shadow:0 18px 45px rgba(0,0,0,.16);
}

/* =========================================================
   ENCABEZADO DE CADA PANTALLA
========================================================= */

.panel-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  margin-bottom:14px;
}

.nombre-indicador{
  min-width:0;
}

.nombre-indicador h2{
  font-size:clamp(28px,2.8vw,48px);
  line-height:1;
}

.nombre-indicador p{
  margin-top:7px;
  font-size:clamp(14px,1.2vw,20px);
  opacity:.82;
}

.estado{
  min-width:180px;
  padding:12px 18px;
  border-radius:16px;
  font-size:clamp(14px,1.3vw,21px);
  font-weight:900;
  text-align:center;
  white-space:nowrap;
}

.estado-normal{
  background:#e4f7ea;
  color:#087a23;
  border:2px solid #52c86d;
}

.estado-advertencia{
  background:#fff2c9;
  color:#a86a00;
  border:2px solid #e2aa22;
}

.estado-critico{
  background:#ffe0e0;
  color:#b00000;
  border:2px solid #e53935;
}

.estado-sindato{
  background:#e6ebf5;
  color:#4c5870;
  border:2px solid #8490a5;
}

/* =========================================================
   TARJETAS KPI
========================================================= */

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:14px;
}

.kpis.seis{
  grid-template-columns:repeat(6,1fr);
}

.kpi{
  background:white;
  color:#001f5b;
  border-radius:17px;
  padding:11px 14px;
  min-height:78px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
}

.kpi-label{
  font-size:clamp(11px,.9vw,15px);
  font-weight:bold;
  opacity:.67;
  text-transform:uppercase;
  letter-spacing:.4px;
}

.kpi-value{
  margin-top:5px;
  font-size:clamp(22px,2.2vw,38px);
  font-weight:900;
  line-height:1;
}

.kpi-value.pequeno{
  font-size:clamp(17px,1.7vw,29px);
}

/* =========================================================
   GRÁFICAS
========================================================= */

.chart-card{
  flex:1;
  min-height:0;
  background:white;
  color:#001f5b;
  border-radius:20px;
  padding:12px 14px 7px;
  display:flex;
  flex-direction:column;
}

.chart-container{
  flex:1;
  min-height:0;
  position:relative;
}

.chart-container svg{
  width:100%;
  height:100%;
  display:block;
}

.chart-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  padding:5px 10px 3px;
  font-size:clamp(11px,1vw,16px);
  font-weight:bold;
}

.leyenda{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
}

.leyenda-meta{
  color:#0a8a24;
}

.leyenda-normal{
  color:#087a23;
}

.leyenda-advertencia{
  color:#b67900;
}

.leyenda-critico{
  color:#d60000;
}

.ultimo-registro{
  text-align:right;
  color:#44516b;
}

/* =========================================================
   PREVENTIVOS
========================================================= */

.preventivo-layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:1.05fr 1.95fr;
  gap:18px;
}

.cumplimiento-card{
  background:white;
  color:#001f5b;
  border-radius:22px;
  padding:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.cumplimiento-titulo{
  font-size:clamp(15px,1.4vw,23px);
  font-weight:bold;
  opacity:.75;
  text-transform:uppercase;
}

.cumplimiento-valor{
  margin-top:12px;
  font-size:clamp(70px,8vw,135px);
  font-weight:900;
  line-height:.9;
}

.cumplimiento-estado{
  margin-top:16px;
  padding:10px 18px;
  border-radius:14px;
  font-size:clamp(15px,1.4vw,23px);
  font-weight:900;
}

.barra-cumplimiento{
  width:100%;
  height:28px;
  border-radius:20px;
  background:#dce3ef;
  overflow:hidden;
  margin-top:22px;
}

.barra-cumplimiento div{
  height:100%;
  border-radius:20px;
  transition:width .8s ease;
}

.preventivos-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.preventivo-kpi{
  background:white;
  color:#001f5b;
  border-radius:18px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.preventivo-kpi .numero{
  font-size:clamp(32px,3.8vw,65px);
  font-weight:900;
  line-height:1;
}

.preventivo-kpi .texto{
  margin-top:8px;
  font-size:clamp(12px,1.1vw,18px);
  font-weight:bold;
  opacity:.75;
}

/* =========================================================
   BARRAS POR ÁREA Y LÍNEA
========================================================= */

.barras-card{
  flex:1;
  min-height:0;
  background:white;
  color:#001f5b;
  border-radius:20px;
  padding:18px 24px;
  overflow:hidden;
}

.lista-barras{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:13px;
}

.fila-barra{
  display:grid;
  grid-template-columns:minmax(180px,28%) 1fr 90px;
  align-items:center;
  gap:15px;
}

.nombre-barra{
  font-size:clamp(13px,1.2vw,20px);
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.fondo-barra{
  height:30px;
  background:#e3e8f1;
  border-radius:16px;
  overflow:hidden;
}

.relleno-barra{
  height:100%;
  border-radius:16px;
  min-width:4px;
}

.valor-barra{
  font-size:clamp(15px,1.4vw,23px);
  font-weight:900;
  text-align:right;
}

/* =========================================================
   TABLA DE CORRECTIVOS
========================================================= */

.tabla-card{
  flex:1;
  min-height:0;
  background:white;
  color:#001f5b;
  border-radius:20px;
  padding:10px 18px;
  overflow:hidden;
}

.tabla-tv{
  width:100%;
  height:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

.tabla-tv th{
  padding:10px 8px;
  font-size:clamp(12px,1vw,17px);
  text-align:left;
  color:#486080;
  border-bottom:2px solid #cfd8e8;
  text-transform:uppercase;
}

.tabla-tv td{
  padding:10px 8px;
  font-size:clamp(13px,1.1vw,19px);
  font-weight:bold;
  border-bottom:1px solid #e0e5ee;
  vertical-align:middle;
}

.prioridad{
  display:inline-block;
  padding:6px 10px;
  border-radius:10px;
  font-size:clamp(11px,.9vw,15px);
  font-weight:900;
}

.prioridad-alta{
  background:#ffe0e0;
  color:#b00000;
}

.prioridad-media{
  background:#fff1c8;
  color:#966000;
}

.prioridad-baja{
  background:#e3f3e8;
  color:#087a23;
}

/* =========================================================
   MENSAJES
========================================================= */

.mensaje-central{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  font-size:clamp(20px,2vw,34px);
  font-weight:900;
  color:#66738d;
}

.error-global{
  position:fixed;
  z-index:100;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  max-width:80%;
  padding:12px 20px;
  border-radius:14px;
  background:#ffe0e0;
  color:#a00000;
  border:2px solid #e53935;
  font-weight:900;
  display:none;
}

/* =========================================================
   PIE DE PÁGINA
========================================================= */

.footer{
  height:7vh;
  min-height:54px;
  padding:9px 26px 10px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:20px;
  border-top:1px solid rgba(255,255,255,.17);
  background:#001f5b;
}

.footer-left{
  font-size:clamp(11px,1vw,15px);
  opacity:.82;
}

.footer-center{
  display:flex;
  align-items:center;
  gap:12px;
}

.control{
  width:42px;
  height:38px;
  border:none;
  border-radius:11px;
  background:white;
  color:#001f5b;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.control:hover{
  background:#dbe4f5;
}

.contador{
  min-width:82px;
  text-align:center;
  font-size:16px;
  font-weight:900;
}

.footer-right{
  text-align:right;
  font-size:clamp(11px,1vw,15px);
  opacity:.82;
}

.progress-wrap{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:5px;
  background:rgba(255,255,255,.16);
}

.progress{
  width:0%;
  height:100%;
  background:white;
}

/* =========================================================
   PRODUCCIÓN Y SCRAP
========================================================= */

.produccion-kpis{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:14px;
}

.produccion-kpi{
  min-height:104px;
  padding:14px 18px;
  border-radius:18px;
  background:white;
  color:#001f5b;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.produccion-kpi.destacado{
  background:#e9f4ff;
  border:2px solid #5aa9e6;
}

.produccion-kpi.scrap{
  background:#fff0f0;
  border:2px solid #ef7070;
}

.produccion-kpi-label{
  font-size:clamp(12px,1vw,17px);
  font-weight:900;
  text-transform:uppercase;
  opacity:.70;
}

.produccion-kpi-valor{
  margin-top:7px;
  font-size:clamp(30px,3vw,52px);
  font-weight:900;
  line-height:1;
}

.produccion-kpi-sub{
  margin-top:7px;
  font-size:clamp(11px,.9vw,15px);
  font-weight:bold;
  opacity:.68;
}

.produccion-chart-card{
  flex:1;
  min-height:0;
  padding:12px 15px 9px;
  border-radius:20px;
  background:white;
  color:#001f5b;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.produccion-chart{
  flex:1;
  min-height:0;
}

.produccion-chart svg{
  display:block;
  width:100%;
  height:100%;
}

.produccion-chart-footer{
  padding:4px 10px 2px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  font-size:clamp(11px,.95vw,15px);
  font-weight:800;
  color:#4c5c78;
}

.produccion-periodo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 16px;
  border-radius:14px;
  background:rgba(22,169,224,.18);
  border:1px solid rgba(22,169,224,.45);
  color:#c9f1ff;
  font-size:clamp(12px,1vw,17px);
  font-weight:900;
  white-space:nowrap;
}
  
  /* =========================================================
   INDICADORES GERENCIALES TV
========================================================= */

.gerencial-periodo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 15px;
  border-radius:13px;
  background:rgba(22,169,224,.18);
  border:1px solid rgba(22,169,224,.45);
  color:#c9f1ff;
  font-size:clamp(12px,1vw,17px);
  font-weight:900;
  white-space:nowrap;
}

.gerencial-disponibilidad-layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:minmax(350px,.95fr) minmax(440px,1.25fr);
  gap:28px;
  align-items:center;
}

.gerencial-torta-wrapper{
  height:100%;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.gerencial-torta{
  position:relative;
  width:min(56vh,520px);
  max-width:100%;
  aspect-ratio:1;
  border-radius:50%;
  background:#295486;
  border:2px solid rgba(255,255,255,.18);
  box-shadow:
    0 18px 45px rgba(0,0,0,.18),
    inset 0 0 0 1px rgba(255,255,255,.08);
}

.gerencial-torta-centro{
  position:absolute;
  inset:27%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-radius:50%;
  background:#0b3475;
  border:1px solid rgba(255,255,255,.17);
}

.gerencial-torta-etiqueta{
  font-size:clamp(15px,1.25vw,22px);
  opacity:.82;
}

.gerencial-torta-valor{
  margin-top:10px;
  font-size:clamp(42px,4.5vw,78px);
  font-weight:900;
  line-height:1;
}

.gerencial-leyenda{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:4px;
  overflow:hidden;
}

.gerencial-leyenda-fila{
  display:grid;
  grid-template-columns:18px 1fr auto;
  align-items:center;
  gap:13px;
  min-height:47px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.10);
}

.gerencial-leyenda-color{
  width:16px;
  height:16px;
  border-radius:5px;
}

.gerencial-leyenda-nombre{
  font-size:clamp(14px,1.2vw,21px);
  font-weight:800;
}

.gerencial-leyenda-valor{
  font-size:clamp(14px,1.2vw,21px);
  font-weight:900;
  text-align:right;
}

.gerencial-tecnicos-grid{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:16px;
}

.gerencial-tecnico-card{
  min-height:0;
  padding:20px 24px;
  border-radius:21px;
  background:rgba(0,31,91,.48);
  border:1px solid rgba(255,255,255,.15);
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.gerencial-tecnico-label{
  font-size:clamp(16px,1.35vw,23px);
  font-weight:900;
  opacity:.82;
}

.gerencial-tecnico-valor{
  margin-top:16px;
  font-size:clamp(36px,3.4vw,62px);
  font-weight:900;
  line-height:1;
}

.gerencial-tecnico-meta{
  margin-top:12px;
  font-size:clamp(13px,1.05vw,18px);
  opacity:.78;
}

.gerencial-grupos-grid{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.gerencial-grupo-card{
  min-height:0;
  padding:26px;
  border-radius:23px;
  background:rgba(0,31,91,.45);
  border:1px solid rgba(255,255,255,.17);
  display:flex;
  flex-direction:column;
}

.gerencial-grupo-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
}

.gerencial-grupo-nombre{
  font-size:clamp(24px,2.1vw,38px);
  font-weight:900;
}

.gerencial-grupo-badge{
  padding:8px 13px;
  border-radius:999px;
  background:rgba(22,169,224,.20);
  color:#c8f2ff;
  font-size:clamp(12px,1vw,17px);
  font-weight:900;
  white-space:nowrap;
}

.gerencial-grupo-valor{
  margin-top:auto;
  font-size:clamp(48px,4.4vw,82px);
  font-weight:900;
  line-height:1;
}

.gerencial-grupo-label{
  margin-top:10px;
  font-size:clamp(15px,1.25vw,21px);
  opacity:.82;
}

.gerencial-grupo-detalles{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:auto;
  padding-top:22px;
  border-top:1px solid rgba(255,255,255,.12);
}

.gerencial-grupo-detalle-label{
  font-size:clamp(12px,1vw,17px);
  opacity:.76;
}

.gerencial-grupo-detalle-valor{
  margin-top:6px;
  font-size:clamp(18px,1.55vw,27px);
  font-weight:900;
}

@media(max-width:1000px){

  .gerencial-disponibilidad-layout{
    grid-template-columns:.85fr 1.15fr;
    gap:16px;
  }

  .gerencial-grupos-grid{
    gap:10px;
  }

  .gerencial-grupo-card{
    padding:18px;
  }

}
  
/* =========================================================
   RESPONSIVO
========================================================= */

@media(max-width:1000px){

  .header-title{
    display:none;
  }

  .kpis.seis{
    grid-template-columns:repeat(3,1fr);
  }

  .preventivo-layout{
    grid-template-columns:1fr 2fr;
  }

}

</style>
</head>

<body>

<div id="errorGlobal" class="error-global"></div>

<header class="header">

  <div class="header-left">

    <div class="logo">TUBOSA</div>

    <div class="header-title">
      <h1>Centro Visual de Mantenimiento</h1>
      <p>Monitoreo operacional de mantenimiento y servicios industriales</p>
    </div>

  </div>

  <div class="header-right">
    <div id="reloj" class="reloj">--:--:--</div>
    <div id="fechaActual" class="fecha">Cargando fecha...</div>
  </div>

</header>

<main id="contenedorSlides" class="main">

  <!-- SERVICIOS INDUSTRIALES -->

  <section
    class="slide activo"
    data-tipo="servicio"
    data-campo="Presion_Aire_SAM"
  ></section>

  <section
    class="slide"
    data-tipo="servicio"
    data-campo="Caudal_Aire"
  ></section>

  <section
    class="slide"
    data-tipo="servicio"
    data-campo="Temperatura_Chiller"
  ></section>

  <section
    class="slide"
    data-tipo="servicio"
    data-campo="Carga_Compresores"
  ></section>

  <section
    class="slide"
    data-tipo="servicio"
    data-campo="Presion_Bombas"
  ></section>

  <!-- PREVENTIVOS -->

  <section
    class="slide"
    data-tipo="preventivos-resumen"
  ></section>

  <section
    class="slide"
    data-tipo="preventivos-area"

function textoSeguro(valor){

  if(
    valor === undefined ||
    valor === null
  ){
    return "";
  }

  return String(valor).trim();

}

function textoNormalizado(valor){

  return textoSeguro(valor)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .toLowerCase()
    .trim();

}

function normalizarNombreCampo(texto){

  return String(texto || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase()
    .trim();

}

function primerValor(objeto,campos){

  if(!objeto || typeof objeto !== "object"){
    return "";
  }

  /*
    Primera búsqueda:
    intenta encontrar el encabezado exacto.
  */
  for(const campo of campos){

    if(
      Object.prototype.hasOwnProperty.call(objeto,campo) &&
      objeto[campo] !== undefined &&
      objeto[campo] !== null &&
      String(objeto[campo]).trim() !== ""
    ){
      return objeto[campo];
    }

  }

  /*
    Segunda búsqueda:
    compara encabezados ignorando:
    - tildes
    - espacios
    - puntos
    - guiones
    - mayúsculas
  */
  const clavesObjeto = Object.keys(objeto);

  for(const campoBuscado of campos){

    const campoNormalizado =
      normalizarNombreCampo(campoBuscado);

    const claveEncontrada =
      clavesObjeto.find(clave => {

        return (
          normalizarNombreCampo(clave) ===
          campoNormalizado
        );

      });

    if(
      claveEncontrada !== undefined &&
      objeto[claveEncontrada] !== undefined &&
      objeto[claveEncontrada] !== null &&
      String(objeto[claveEncontrada]).trim() !== ""
    ){
      return objeto[claveEncontrada];
    }

  }

  return "";

}

function numero(valor){

  if(
    valor === undefined ||
    valor === null ||
    valor === ""
  ){
    return null;
  }

  let texto = String(valor)
    .trim()
    .replace(/\s/g,"")
    .replace("%","");

  if(texto.includes(",") && !texto.includes(".")){
    texto = texto.replace(",",".");
  }

  const n = Number(texto);

  return isNaN(n) ? null : n;

}

function redondear(valor){

    valor === null ||
    valor === undefined ||
    isNaN(valor)
  ){
    return "-";
  }

  return Number(Number(valor).toFixed(1));
}

/* =========================================================
   FECHAS
========================================================= */

function fechaISO(valor){

  if(
    valor === undefined ||
    valor === null ||
    valor === ""
  ){
    return null;
  }

  /*
    Si ya viene como fecha.
  */
  if(valor instanceof Date){

    const copia = new Date(valor);

    return isNaN(copia.getTime())
      ? null
      : copia;

  }

  /*
    Fechas seriales de Google Sheets o Excel.
    Ejemplo: 46209
  */
  if(
    typeof valor === "number" &&
    valor > 20000 &&
    valor < 80000
  ){

    const fechaSerial = new Date(
      Math.round(
        (valor - 25569) * 86400 * 1000
      )
    );

    /*
      Compensación para evitar desplazamiento
      por zona horaria.
    */
    return new Date(
      fechaSerial.getUTCFullYear(),
      fechaSerial.getUTCMonth(),
      fechaSerial.getUTCDate()
    );

  }

  let texto = String(valor).trim();

  if(!texto){
    return null;
  }

  /*
    Elimina hora si viene:
    10/07/2026 00:00:00
  */
  texto = texto
    .replace(/\s+/g," ")
    .trim();

  /*
    Formato ISO:
    2026-07-10
    2026-07-10T05:00:00.000Z
  */
  const formatoISO =
    texto.match(
      /^(\d{4})-(\d{1,2})-(\d{1,2})/
    );

  if(formatoISO){

    const anio = Number(formatoISO[1]);
    const mes = Number(formatoISO[2]) - 1;
    const dia = Number(formatoISO[3]);

    const fecha = new Date(
      anio,
      mes,
      dia
    );

    return isNaN(fecha.getTime())
      ? null
      : fecha;

  }

  /*
    Formatos colombianos:
    10/07/2026
    10-07-2026
    10.07.2026
  */
  const formatoColombia =
    texto.match(
      /^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/
    );

  if(formatoColombia){

    const dia = Number(formatoColombia[1]);
    const mes = Number(formatoColombia[2]) - 1;

    let anio = Number(formatoColombia[3]);

    if(anio < 100){
      anio += 2000;
    }

    const fecha = new Date(
      anio,
      mes,
      dia
    );

    return isNaN(fecha.getTime())
      ? null
      : fecha;

  }

  /*
    Último intento con el navegador.
  */
  const fechaGenerica = new Date(texto);

  return isNaN(fechaGenerica.getTime())
    ? null
    : fechaGenerica;

}
function horaA24(horaTexto){

  if(!horaTexto) return "00:00";

  let texto = String(horaTexto)
    .trim()
    .toLowerCase()
    .replace(/\s/g,"")
    .replace(/a\.\s*m\./g,"am")
    .replace(/p\.\s*m\./g,"pm")
    .replace(/a\.m\./g,"am")
    .replace(/p\.m\./g,"pm")
    .replace(/a\.m/g,"am")
    .replace(/p\.m/g,"pm");

  const esPM = texto.includes("pm");
  const esAM = texto.includes("am");

  texto = texto
    .replace("am","")
    .replace("pm","");

  const coincidencia =
    texto.match(/(\d{1,2})(?::(\d{1,2}))?/);

  if(!coincidencia) return "00:00";

  let horas = Number(coincidencia[1]);
  let minutos = Number(coincidencia[2] || 0);

  if(esPM && horas < 12) horas += 12;
  if(esAM && horas === 12) horas = 0;

  return (
    String(horas).padStart(2,"0") +
    ":" +
    String(minutos).padStart(2,"0")
  );

}

function fechaHoraObj(fechaTexto,horaTexto){

  const fecha = fechaISO(fechaTexto);

  if(!fecha) return new Date(0);

  const partesHora = horaA24(horaTexto).split(":");

  fecha.setHours(
    Number(partesHora[0]),
    Number(partesHora[1]),
    0,
    0
  );

  return fecha;

}

async function cargarHoja(nombreHoja){

  const url =
    URL_API +
    "?accion=listar&hoja=" +

    "&t=" +
    Date.now();

    method:"GET",
    cache:"no-store"
  });

  if(!respuesta.ok){

      "La API respondió con estado " +
      respuesta.status
    );

  const data = await respuesta.json();

  if(data.error){
    throw new Error(data.error);
  }

  return Array.isArray(data.datos)
    ? data.datos
    : [];

}

function fechaLocalAPI(fecha){

  const anio =
    fecha.getFullYear();

  const mes =
    String(
      fecha.getMonth() + 1
    ).padStart(2,"0");

  const dia =
    String(
      fecha.getDate()
    ).padStart(2,"0");

  return `${anio}-${mes}-${dia}`;
}

    new Date(
      hoy.getFullYear(),

    fechaInicio:

  };
}

function cargarTarjetaGerencial(){

  return new Promise(
    (resolve,reject) => {

      const rango =
        rangoGerencialMesActual();

      const callback =
        "callbackTVGerencial_" +
        Date.now() +
        "_" +
        Math.floor(
          Math.random() * 100000
        );

      const script =
        document.createElement("script");

      const timeout =
        setTimeout(() => {

          limpiar();

          reject(
            new Error(
              "La consulta gerencial tardó demasiado."
            )
          );

        },30000);

      function limpiar(){

        clearTimeout(timeout);

        if(script.parentNode){
          script.parentNode.removeChild(script);
        }

        try{
          delete window[callback];
        }catch(error){
          window[callback] = undefined;
        }
      }

      window[callback] =
        function(data){

          limpiar();

          if(
            !data ||
            data.ok === false
          ){

            reject(
              new Error(
                data &&
                data.mensaje
                  ? data.mensaje
                  : "No fue posible obtener los indicadores gerenciales."
              )
            );

            return;
          }

          resolve(data);
        };

      script.onerror =
        function(){

          limpiar();

          reject(
            new Error(
              "No fue posible conectar con los indicadores gerenciales."
            )
          );
        };

      const parametros =
        new URLSearchParams({

          accion:
            "obtener_tarjeta_gerencial",

          fechaInicio:
            rango.fechaInicio,

          fechaFin:
            rango.fechaFin,

          vista:
            "general",

          callback:
            callback,

          t:
            Date.now()

        });

      script.src =
        URL_API +
        "?" +
        parametros.toString();

      document.body.appendChild(
        script
      );

    }
  );
}

function calcularEstadisticas(datos){

  if(!datos.length){

    return{
      promedio:null,
      minimo:null,
      maximo:null
    };

  }

  const valores =
    datos.map(item => item.valor);

  const suma =
    valores.reduce(
      (acumulado,valor) =>
      acumulado + valor,
      0
    );

  return{
    promedio:redondear(
      suma / valores.length
    ),
    minimo:redondear(
      Math.min(...valores)
    ),
    maximo:redondear(
      Math.max(...valores)
    )
  };

}

    valor > config.criticoMax
  ){

    return{
      texto:"CRÍTICO",
      icono:"●",
      clase:"estado-critico",
      color:"#e00000"
    };

  }

  if(
    valor < config.min ||
    valor > config.max
  ){

    return{
      texto:"ADVERTENCIA",
      icono:"●",
      clase:"estado-advertencia",
      color:"#e1a000"
    };

  }

  return{
    texto:"NORMAL",
    icono:"●",
    clase:"estado-normal",
    color:"#0a8a24"
  };

}

function mostrarValor(valor,unidad){

  if(
    valor === null ||
    valor === undefined
  ){
    return "-";
  }

  return redondear(valor) +
    " " +
    unidad;

}

function crearGraficaServicio(datos,config){

  if(!datos.length){

    return `
      <div class="mensaje-central">
        No existen datos registrados para este indicador.
      </div>
    `;

  }

  const ancho = 1200;
  const alto = 420;

  const margenIzquierdo = 85;
  const margenDerecho = 35;
  const margenSuperior = 38;
  const margenInferior = 72;

  const anchoGrafica =
    ancho -
    margenIzquierdo -
    margenDerecho;

  const altoGrafica =
    alto -
    margenSuperior -
    margenInferior;

  const valores =
    datos.map(item => item.valor);

  let minimoGrafica = Math.min(
    ...valores,
    config.criticoMin,
    config.min,
    config.meta
  );

  let maximoGrafica = Math.max(
    ...valores,
    config.criticoMax,
    config.max,
    config.meta
  );

  const distancia =
    maximoGrafica - minimoGrafica;

  const margenExtra =
    distancia > 0
      ? distancia * .12
      : 5;

  minimoGrafica -= margenExtra;
  maximoGrafica += margenExtra;

  const escalaY = valor => {

    return margenSuperior +
      (
        (maximoGrafica - valor) /
        (maximoGrafica - minimoGrafica)
      ) *
      altoGrafica;

  };

  const escalaX = indice => {

    if(datos.length === 1){

      return margenIzquierdo +
        anchoGrafica / 2;

    }

    return margenIzquierdo +
      indice *
      (
        anchoGrafica /
        (datos.length - 1)
      );

  };

  const yCriticoMax =
    escalaY(config.criticoMax);

  const yMaxNormal =
    escalaY(config.max);

  const yMeta =
    escalaY(config.meta);

  const yMinNormal =
    escalaY(config.min);

  const yCriticoMin =
    escalaY(config.criticoMin);

  const finGrafica =
    margenSuperior +
    altoGrafica;

  const puntos =
    datos.map((item,indice) => {

      const estado =
        obtenerEstadoServicio(
          item.valor,
          config
        );

      return{
        x:escalaX(indice),
        y:escalaY(item.valor),
        valor:item.valor,
        fecha:item.fechaObj,
        color:estado.color
      };

    });

  const linea =
    puntos
      .map(
        punto =>
        punto.x + "," + punto.y
      )
      .join(" ");

  const elementosPuntos =
    puntos
      .map(punto => {

        const etiquetaFecha =
          punto.fecha.toLocaleString(
            "es-CO",
            {
              day:"2-digit",
              month:"2-digit",
              hour:"2-digit",
              minute:"2-digit",
              hour12:false
            }
          );

        const yTexto =
          Math.max(
            margenSuperior + 17,
            punto.y - 16
          );

        return `

          <circle
            cx="${punto.x}"
            cy="${punto.y}"
            r="9"
            fill="${punto.color}"
            stroke="#001f5b"
            stroke-width="4"
          ></circle>

          <text
            x="${punto.x}"
            y="${yTexto}"
            text-anchor="middle"
            font-size="22"
            font-weight="900"
            fill="#001f5b"
          >
            ${redondear(punto.valor)}
          </text>

          <text
            x="${punto.x}"
            y="${alto - 30}"
            text-anchor="middle"
            font-size="15"
            font-weight="700"
            fill="#42506b"
          >
            ${etiquetaFecha}
          </text>

        `;

      })
      .join("");

  const cantidadLineasEje = 5;

  let lineasEje = "";

  for(
    let i = 0;
    i < cantidadLineasEje;
    i++
  ){

    const proporcion =
      i /
      (cantidadLineasEje - 1);

    const valor =
      maximoGrafica -
      proporcion *
      (
        maximoGrafica -
        minimoGrafica
      );

    const y = escalaY(valor);

    lineasEje += `

      <line
        x1="${margenIzquierdo}"
        y1="${y}"
        x2="${ancho - margenDerecho}"
        y2="${y}"
        stroke="#ccd6e8"
        stroke-width="1"
      ></line>

      <text
        x="${margenIzquierdo - 15}"
        y="${y + 6}"
        text-anchor="end"
        font-size="17"
        font-weight="700"
        fill="#53617a"
      >
        ${redondear(valor)}
      </text>

    `;

  }

  return `

    <svg
      viewBox="0 0 ${ancho} ${alto}"
      preserveAspectRatio="none"
      role="img"
      aria-label="Gráfica del indicador"
    >

      <!-- ZONA CRÍTICA SUPERIOR -->

      <rect
        x="${margenIzquierdo}"
        y="${margenSuperior}"
        width="${anchoGrafica}"
        height="${Math.max(
          0,
          yCriticoMax - margenSuperior
        )}"
        fill="#ffdada"
        opacity=".92"
      ></rect>

      <!-- ADVERTENCIA SUPERIOR -->

      <rect
        x="${margenIzquierdo}"
        y="${yCriticoMax}"
        width="${anchoGrafica}"
        height="${Math.max(
          0,
          yMaxNormal - yCriticoMax
        )}"
        fill="#fff1c2"
        opacity=".92"
      ></rect>

      <!-- ZONA NORMAL -->

      <rect
        x="${margenIzquierdo}"
        y="${yMaxNormal}"
        width="${anchoGrafica}"
        height="${Math.max(
          0,
          yMinNormal - yMaxNormal
        )}"
        fill="#dff5e7"
        opacity=".95"
      ></rect>

      <!-- ADVERTENCIA INFERIOR -->

      <rect
        x="${margenIzquierdo}"
        y="${yMinNormal}"
        width="${anchoGrafica}"
        height="${Math.max(
          0,
          yCriticoMin - yMinNormal
        )}"
        fill="#fff1c2"
        opacity=".92"
      ></rect>

      <!-- ZONA CRÍTICA INFERIOR -->

      <rect
        x="${margenIzquierdo}"
        y="${yCriticoMin}"
        width="${anchoGrafica}"
        height="${Math.max(
          0,
          finGrafica - yCriticoMin
        )}"
        fill="#ffdada"
        opacity=".92"
      ></rect>

      ${lineasEje}

      <!-- LÍMITES CRÍTICOS -->

      <line
        x1="${margenIzquierdo}"
        y1="${yCriticoMax}"
        x2="${ancho - margenDerecho}"
        y2="${yCriticoMax}"
        stroke="#e00000"
        stroke-width="3"
        stroke-dasharray="10,8"
      ></line>

      <line
        x1="${margenIzquierdo}"
        y1="${yCriticoMin}"
        x2="${ancho - margenDerecho}"
        y2="${yCriticoMin}"
        stroke="#e00000"
        stroke-width="3"
        stroke-dasharray="10,8"
      ></line>

      <!-- LÍMITES NORMALES -->

      <line
        x1="${margenIzquierdo}"
        y1="${yMaxNormal}"
        x2="${ancho - margenDerecho}"
        y2="${yMaxNormal}"
        stroke="#0a8a24"
        stroke-width="2"
        stroke-dasharray="8,7"
      ></line>

      <line
        x1="${margenIzquierdo}"
        y1="${yMinNormal}"
        x2="${ancho - margenDerecho}"
        y2="${yMinNormal}"
        stroke="#0a8a24"
        stroke-width="2"
        stroke-dasharray="8,7"
      ></line>

      <!-- META -->

      <line
        x1="${margenIzquierdo}"
        y1="${yMeta}"
        x2="${ancho - margenDerecho}"
        y2="${yMeta}"
        stroke="#078f22"
        stroke-width="4"
        stroke-dasharray="12,9"
      ></line>

      <text
        x="${ancho - margenDerecho - 6}"
        y="${yMeta - 9}"
        text-anchor="end"
        font-size="17"
        font-weight="900"
        fill="#078f22"
      >
        Meta ${config.meta} ${config.unidad}
      </text>

      <!-- TENDENCIA -->

      <polyline
        points="${linea}"
        fill="none"
        stroke="#001f5b"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
      ></polyline>

      ${elementosPuntos}

    </svg>

  `;

}

function fechaProgramadaPreventivo(registro){

      "FechaInicioExtrema",
      "Fecha inicio extrema",

    ]);

}

function esEjecutadoPreventivo(registro){

  const estado =
    estadoPreventivo(registro);

  return (
    estado.includes("ejecutado") ||
    estado.includes("terminado") ||
    estado.includes("cerrado") ||
    estado.includes("finalizado")
  );

}

function esCanceladoPreventivo(registro){

  const estado =
    estadoPreventivo(registro);

  return (
    estado.includes("cancelado") ||
    estado.includes("no realizado") ||
    estado.includes("no ejecutado")
  );

}

function esIniciadoPreventivo(registro){

  const estado =
    estadoPreventivo(registro);

  return (
    estado.includes("iniciado") ||
    estado.includes("ejecucion") ||
    estado.includes("en proceso")
  );

}

function esAsignadoPreventivo(registro){

  const estado =
    estadoPreventivo(registro);

  return (
    estado.includes("asignado") ||
    estado.includes("programado")
  );

}
function preventivosMesActual(){

  const inicio = inicioMesActual();
  const fin = finPeriodoMesActual();

  return registrosPreventivos.filter(registro => {

    const fecha =
      fechaProgramadaPreventivo(registro);

    return (
      fecha &&
      !isNaN(fecha.getTime()) &&
      fecha >= inicio &&
      fecha <= fin
    );

  });

}

function estadisticasPreventivos(){

  const registrosMes =
    preventivosMesActual();

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const ejecutados =
    registrosMes.filter(
      esEjecutadoPreventivo
    ).length;

  const cancelados =
    registrosMes.filter(
      esCanceladoPreventivo
    ).length;

  const iniciados =
    registrosMes.filter(
      esIniciadoPreventivo
    ).length;

  const asignados =
    registrosMes.filter(
      esAsignadoPreventivo
    ).length;

  const pendientes =
    registrosMes.filter(registro => {

      return (
        !esEjecutadoPreventivo(registro) &&
        !esCanceladoPreventivo(registro) &&
        !esIniciadoPreventivo(registro) &&
        !esAsignadoPreventivo(registro)
      );

    }).length;

  /*
    Vencidos históricos:
    preventivos con fecha anterior a hoy
    que aún no han sido ejecutados ni cancelados.
  */
  const vencidos =
    registrosPreventivos.filter(registro => {

      const fecha =
        fechaProgramadaPreventivo(registro);

      return (
        fecha &&
        !isNaN(fecha.getTime()) &&
        fecha < hoy &&
        !esEjecutadoPreventivo(registro) &&
        !esCanceladoPreventivo(registro)
      );

    }).length;

  /*
    Backlog total activo:
    todos los preventivos abiertos,
    aunque sean de meses anteriores.
  */
  const backlog =
    registrosPreventivos.filter(registro => {

      return (
        !esEjecutadoPreventivo(registro) &&
        !esCanceladoPreventivo(registro)
      );

    }).length;

  const baseCumplimiento =
    registrosMes.length - cancelados;

  const cumplimiento =
    baseCumplimiento > 0
      ? redondear(
          ejecutados /
          baseCumplimiento *
          100
        )
      : 0;

  return {
    total: registrosMes.length,
    ejecutados: ejecutados,
    cancelados: cancelados,
    iniciados: iniciados,
    asignados: asignados,
    pendientes: pendientes,
    vencidos: vencidos,
    backlog: backlog,
    cumplimiento: cumplimiento
  };

}
function estadoCumplimiento(valor){

  if(valor >= 90){

    return{
      texto:"CUMPLIMIENTO EN META",

    return{
      texto:"CUMPLIMIENTO EN ADVERTENCIA",

    };

  }

  return{
    texto:"CUMPLIMIENTO CRÍTICO",

  };

}

function areaPreventivo(registro){

  return textoSeguro(
    primerValor(registro,[
      "Área",
      "Area",
      "DenominaciónTecnica",
      "DenominacionTecnica"
    ])
  ) || "Sin área";

}

function cumplimientoPreventivoPorArea(){

  const registrosMes =
    preventivosMesActual();

  const agrupado = {};

  registrosMes.forEach(registro => {

    const area =
      areaPreventivo(registro);

    if(!agrupado[area]){

      agrupado[area] = {
        total:0,
        ejecutados:0,
        cancelados:0
      };

    }

    agrupado[area].total++;

    if(esEjecutadoPreventivo(registro)){
      agrupado[area].ejecutados++;
    }

    if(esCanceladoPreventivo(registro)){
      agrupado[area].cancelados++;
    }

  });

  return Object.entries(agrupado)
    .map(([area,dato]) => {

      const base =
        dato.total -
        dato.cancelados;

      const cumplimiento =
        base > 0
          ? redondear(
              dato.ejecutados /
              base *
              100
            )
          : 0;

      return {
        area: area,
        total: dato.total,
        ejecutados: dato.ejecutados,
        cumplimiento: cumplimiento
      };

    })
    .sort(
      (a,b) =>
      b.cumplimiento -
      a.cumplimiento
    )
    .slice(0,8);

}
function colorCumplimiento(valor){

  if(valor >= 90){
    return "#15972e";
  }

  if(valor >= 80){
    return "#e1a000";
  }

  return "#dd2020";
}

function estadisticasCorrectivos(){

  const registrosMes =
    correctivosMesActual();

  const abiertos =
    correctivosAbiertos();

  const cerradosMes =
    registrosMes.filter(
      esCorrectivoCerrado
    );

  const pendientes =
    abiertos.filter(registro => {

      const quedaPendiente =
        textoNormalizado(
          primerValor(registro,[
            "QuedaPendiente",
            "Queda pendiente",
            "Pendiente"
          ])
        );

      return (
        quedaPendiente === "si" ||
        quedaPendiente === "sí"
      );

    }).length;

  const criticos =
    abiertos.filter(
      esPrioridadCritica
    ).length;

  const tiempos = [];

  cerradosMes.forEach(registro => {

    let tiempo =
      numero(
        primerValor(registro,[
          "TiempoTotalIntervencion",
          "Tiempo total intervención",
          "TiempoIntervencion",
          "TiempoCierrePendiente"
        ])
      );

    if(tiempo === null){

      const inicio =
        fechaReporteCorrectivo(registro);

      const fin =
        fechaCierreCorrectivo(registro);

      tiempo =
        diferenciaMinutos(
          inicio,
          fin
        );

    }

    if(
      tiempo !== null &&
      !isNaN(tiempo) &&
      tiempo >= 0
    ){
      tiempos.push(tiempo);
    }

  });

  const tiempoPromedio =
    tiempos.length > 0
      ? redondear(
          tiempos.reduce(
            (acumulado,valor) =>
              acumulado + valor,
            0
          ) / tiempos.length
        )
      : 0;

  const tasaCierre =
    registrosMes.length > 0
      ? redondear(
          cerradosMes.length /
          registrosMes.length *
          100
        )
      : 0;

  return {
    reportados: registrosMes.length,
    cerrados: cerradosMes.length,
    abiertos: abiertos.length,
    pendientes: pendientes,
    criticos: criticos,
    tiempoPromedio: tiempoPromedio,
    tasaCierre: tasaCierre
  };

}

function numeroSAP(valor){

  if(
    valor === undefined ||
    valor === null ||
    valor === ""
  ){
    return 0;
  }

  /*
    Cuando la API entrega un número real,
    se utiliza directamente.
  */
  if(
    typeof valor === "number" &&
    !isNaN(valor)
  ){
    return valor;
  }

  let texto =
    String(valor)
      .trim()
      .replace(/\s/g,"")
      .replace("%","");

  if(!texto){
    return 0;
  }

  /*
    Formato SAP colombiano:
    1.436,000 = 1436 kg
    594,000   = 594 kg
  */
  if(
    texto.includes(".") &&
    texto.includes(",")
  ){

    texto =
      texto
        .replace(/\./g,"")
        .replace(",",".");
  }
  else if(texto.includes(",")){

    texto =
      texto.replace(",",".");
  }

  const resultado =
    Number(texto);

  return isNaN(resultado)
    ? 0
    : resultado;
}

function numeroLineaProduccion(registro){

  const puesto =
    textoNormalizado(
      primerValor(registro,[
        "Puesto de trabajo",
        "PuestoTrabajo"
      ])
    );

  const coincidencia =
    puesto.match(/lin\s*0*(\d{1,2})/);

  if(!coincidencia){
    return null;
  }

  const linea =
    Number(coincidencia[1]);

  if(
    linea < 3 ||
    linea > 21
  ){
    return null;
  }

  return linea;
}

function registrosProduccionMesActual(){

  const inicio =
    inicioMesActual();

  const ahora =
    new Date();

  return registrosProduccion.filter(
    registro => {

      const fechaHora =
        fechaHoraProduccion(
          registro
        );

      const linea =
        numeroLineaProduccion(
          registro
        );

      return (
        esRegistroFinalizadoProduccion(
          registro
        ) &&
        fechaHora &&
        !isNaN(
          fechaHora.getTime()
        ) &&
        fechaHora.getTime() > 0 &&
        fechaHora >= inicio &&
        fechaHora <= ahora &&
        linea !== null
      );

    }
  );
}


function calcularProduccionSAP(){

  const registrosMes =
    registrosProduccionMesActual();

  const lineas = {};

  for(
    let numeroLinea = 3;
    numeroLinea <= 21;
    numeroLinea++
  ){

    lineas[numeroLinea] = {
      linea:numeroLinea,
      kgBuenos:0,
      kgScrap:0,
      kgProcesados:0,
      toneladasBuenas:0,
      toneladasScrap:0,
      porcentajeScrap:0
    };

  }

  let kgBuenosTotal = 0;
  let kgScrapTotal = 0;

  registrosMes.forEach(registro => {

    const linea =
      numeroLineaProduccion(
        registro
      );

    if(
      linea === null ||
      !lineas[linea]
    ){
      return;
    }

    const pesoNeto =
      numeroSAP(
        primerValor(registro,[
          "Peso Neto",
          "PesoNeto"
        ])
      );

    if(pesoNeto <= 0){
      return;
    }

    if(esRegistroScrap(registro)){

      lineas[linea].kgScrap +=
        pesoNeto;

      kgScrapTotal +=
        pesoNeto;

    }else{

      lineas[linea].kgBuenos +=
        pesoNeto;

      kgBuenosTotal +=
        pesoNeto;

    }

  });

  const datosLineas =
    Object.values(lineas)
      .map(item => {

        const kgProcesados =
          item.kgBuenos +
          item.kgScrap;

        const porcentajeScrap =
          kgProcesados > 0
            ? item.kgScrap /
              kgProcesados *
              100
            : 0;

        return {
          linea:item.linea,
          nombre:"L" + item.linea,
          kgBuenos:item.kgBuenos,
          kgScrap:item.kgScrap,
          kgProcesados:kgProcesados,
          toneladasBuenas:
            item.kgBuenos / 1000,
          toneladasScrap:
            item.kgScrap / 1000,
          porcentajeScrap:
            porcentajeScrap
        };

      });

  const kgProcesadosTotal =
    kgBuenosTotal +
    kgScrapTotal;

  const porcentajeScrapTotal =
    kgProcesadosTotal > 0
      ? kgScrapTotal /
        kgProcesadosTotal *
        100
      : 0;

  const lineasScrapOrdenadas =
    [...datosLineas]
      .filter(
        item =>
          item.kgProcesados > 0
      )
      .sort(
        (a,b) =>
          b.porcentajeScrap -
          a.porcentajeScrap
      );

  return {
    registros:registrosMes.length,
    kgBuenosTotal:kgBuenosTotal,
    toneladasBuenasTotal:
      kgBuenosTotal / 1000,
    kgScrapTotal:kgScrapTotal,
    toneladasScrapTotal:
      kgScrapTotal / 1000,
    kgProcesadosTotal:
      kgProcesadosTotal,
    toneladasProcesadasTotal:
      kgProcesadosTotal / 1000,
    porcentajeScrapTotal:
      porcentajeScrapTotal,
    lineas:datosLineas,
    lineasScrap:
      lineasScrapOrdenadas
  };
}


function formatearNumeroProduccion(

/* =========================================================
   GRÁFICA TONELADAS BUENAS POR LÍNEA
========================================================= */

function crearGraficaProduccionLineas(
  datos
){

  const ancho = 1400;
  const alto = 420;

  const margenIzquierdo = 65;
  const margenDerecho = 25;
  const margenSuperior = 40;
  const margenInferior = 55;

  const anchoUtil =
    ancho -
    margenIzquierdo -
    margenDerecho;

  const altoUtil =
    alto -
    margenSuperior -
    margenInferior;

  const maximoReal =
    Math.max(
      0,
      ...datos.map(
        item =>
          item.toneladasBuenas
      )
    );

  const maximo =
    maximoReal > 0
      ? maximoReal * 1.15
      : 1;

  const espacio =
    anchoUtil /
    datos.length;

  const anchoBarra =
    Math.max(
      18,
      espacio * .62
    );

  const lineasGuia = 5;

  let guias = "";

  for(
    let i = 0;
    i <= lineasGuia;
    i++
  ){

    const valor =
      maximo *
      (
        1 -
        i / lineasGuia
      );

    const y =
      margenSuperior +
      altoUtil *
      i /
      lineasGuia;

    guias += `

      <line
        x1="${margenIzquierdo}"
        y1="${y}"
        x2="${ancho - margenDerecho}"
        y2="${y}"
        stroke="#d6deeb"
        stroke-width="1"
      ></line>

      <text
        x="${margenIzquierdo - 10}"
        y="${y + 6}"
        text-anchor="end"
        font-size="15"
        font-weight="700"
        fill="#56647c"
      >
        ${formatearNumeroProduccion(
          valor,
          1
        )}
      </text>

    `;

  }

  const barras =
    datos.map(
      (item,indice) => {

        const x =
          margenIzquierdo +
          indice * espacio +
          (
            espacio -
            anchoBarra
          ) / 2;

        const altura =
          maximo > 0
            ? item.toneladasBuenas /
              maximo *
              altoUtil
            : 0;

        const y =
          margenSuperior +
          altoUtil -
          altura;

        const valorVisible =
          item.toneladasBuenas > 0
            ? formatearNumeroProduccion(
                item.toneladasBuenas,
                1
              )
            : "0";

        return `

          <rect
            x="${x}"
            y="${y}"
            width="${anchoBarra}"
            height="${Math.max(
              1,
              altura
            )}"
            rx="7"
            fill="#176fc2"
          ></rect>

          <text
            x="${x + anchoBarra / 2}"
            y="${Math.max(
              22,
              y - 9
            )}"
            text-anchor="middle"
            font-size="16"
            font-weight="900"
            fill="#001f5b"
          >
            ${valorVisible}
          </text>

          <text
            x="${x + anchoBarra / 2}"
            y="${alto - 20}"
            text-anchor="middle"
            font-size="16"
            font-weight="900"
            fill="#43516c"
          >
            ${item.nombre}
          </text>

        `;

      }
    ).join("");

  return `

    <svg
      viewBox="0 0 ${ancho} ${alto}"
      preserveAspectRatio="none"
      role="img"
      aria-label="Toneladas buenas fabricadas por línea"
    >

      ${guias}

      ${barras}

    </svg>

  `;
}

function colorScrapPorcentaje(valor){

  if(valor <= 3){
    return "#15972e";
  }

  if(valor <= 5){
    return "#d18a00";
  }

  return "#d92020";
}


function crearGraficaScrapLineas(
  datos
){

  if(!datos.length){

    return `
      <div class="mensaje-central">
        No existen registros de producción
        para calcular scrap.
      </div>
    `;

  }

  const ancho = 1400;
  const alto = 430;

  const margenIzquierdo = 110;
  const margenDerecho = 260;
  const margenSuperior = 20;
  const margenInferior = 20;

  const anchoUtil =
    ancho -
    margenIzquierdo -
    margenDerecho;

  const cantidad =
    datos.length;

  const altoFila =
    Math.min(
      44,
      (
        alto -
        margenSuperior -
        margenInferior
      ) /
      cantidad
    );

  const maximo =
    Math.max(
      1,
      ...datos.map(
        item =>
          item.porcentajeScrap
      )
    );

const xPorcentaje =
  ancho -
  margenDerecho +
  25;

const xToneladas =
  ancho -
  25;
  
  const filas =
    datos.map(
      (item,indice) => {

        const y =
          margenSuperior +
          indice *
          altoFila;

        const anchoBarra =
          item.porcentajeScrap /
          maximo *
          anchoUtil;

        const color =
          colorScrapPorcentaje(
            item.porcentajeScrap
          );

        return `

          <text
            x="${margenIzquierdo - 15}"
            y="${y + altoFila * .67}"
            text-anchor="end"
            font-size="17"
            font-weight="900"
            fill="#001f5b"
          >
            L${item.linea}
          </text>

          <rect
            x="${margenIzquierdo}"
            y="${y + 7}"
            width="${anchoUtil}"
            height="${Math.max(
              16,
              altoFila - 13
            )}"
            rx="8"
            fill="#e4e9f1"
          ></rect>

          <rect
            x="${margenIzquierdo}"
            y="${y + 7}"
            width="${Math.max(
              3,
              anchoBarra
            )}"
            height="${Math.max(
              16,
              altoFila - 13
            )}"
            rx="8"
            fill="${color}"
          ></rect>

          <text
  x="${ancho - margenDerecho + 25}"
  y="${y + altoFila * .67}"
  text-anchor="start"
  font-size="17"
  font-weight="900"
  fill="${color}"
>
          >
            ${formatearNumeroProduccion(
              item.porcentajeScrap,
              2
            )}%
          </text>

          <text
  x="${ancho - 25}"
  y="${y + altoFila * .67}"
  text-anchor="end"
  font-size="16"
  font-weight="800"
  fill="#4c5c78"
>
            ${formatearNumeroProduccion(
              item.toneladasScrap,
              2
            )} t
          </text>

        `;

      }
    ).join("");

  return `

    <svg
      viewBox="0 0 ${ancho} ${alto}"
      preserveAspectRatio="none"
      role="img"
      aria-label="Porcentaje de scrap por línea"
    >

      ${filas}

    </svg>

  `;
}

const COLORES_TORTA_TV = [
  "#123f55",

  "#ff7a28",

  "#9b2fa6",
  "#52b92d",

];

function formatoNumeroTV(
  valor,
  decimales = 2
){

  const n =
    Number(valor || 0);

  return n.toLocaleString(
    "es-CO",
    {
      minimumFractionDigits:
        decimales,

      maximumFractionDigits:
        decimales
    }
  );
}

function formatoPorcentajeTV(valor){

  return (
    formatoNumeroTV(
      valor,
      2
    ) +
    "%"
  );
}

function formatoHorasTV(valor){

  return (
    formatoNumeroTV(
      valor,
      2
    ) +
    " h"
  );
}

function formatoToneladasTV(valor){

  return (
    formatoNumeroTV(
      valor,
      2
    ) +
    " t"
  );
}

function escaparHTMLTV(valor){

  return String(valor ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

    datosGerenciales.resumen || {};

  const responsables =
    Array.isArray(
      datosGerenciales.responsables
    )
      ? datosGerenciales.responsables
      : [];

  const segmentos = [];

  segmentos.push({

    nombre:
      "% DISPONIBILIDAD",

    valor:
      Math.max(
        Number(
          resumen.disponibilidad || 0
        ),
        0
      )

  });

  responsables.forEach(item => {

    const valor =
      Number(
        item.impactoDisponibilidad || 0
      );

    if(valor > 0){

      segmentos.push({

        nombre:
          item.nombre,

        valor:
          valor

      });

    }

  });

  const suma =
    segmentos.reduce(
      (total,item) =>
        total + item.valor,
      0
    );

  if(suma < 100){

    segmentos.push({

      nombre:
        "OTROS / AJUSTE",

      valor:
        100 - suma

    });

  }

  const total =
    segmentos.reduce(
      (total,item) =>
        total +
        Math.max(
          Number(item.valor || 0),
          0
        ),
      0
    );

  const normalizados =
    total > 0
      ? segmentos
          .filter(
            item =>
              Number(item.valor || 0) > 0
          )
          .map(item => ({

            nombre:
              item.nombre,

            valor:
              (
                Number(item.valor || 0) /
                total
              ) * 100

          }))
      : [{
          nombre:"SIN DATOS",
          valor:100
        }];

  let acumulado = 0;

  const gradientes =
    normalizados.map(
      (item,index) => {

        const inicio =
          acumulado;

        acumulado +=
          item.valor;

        const color =
          COLORES_TORTA_TV[
            index %
            COLORES_TORTA_TV.length
          ];

        return (
          `${color} ${inicio}% ${acumulado}%`
        );

      }
    );

  const leyenda =
    normalizados.map(
      (item,index) => {

        const color =
          COLORES_TORTA_TV[
            index %
            COLORES_TORTA_TV.length
          ];

        return `

          <div class="gerencial-leyenda-fila">

            <span
              class="gerencial-leyenda-color"
              style="background:${color}"
            ></span>

            <span class="gerencial-leyenda-nombre">
              ${escaparHTMLTV(item.nombre)}
            </span>

            <span class="gerencial-leyenda-valor">
              ${formatoPorcentajeTV(item.valor)}
            </span>

          </div>

        `;

      }
    ).join("");

  slide.innerHTML = `

    <div class="panel">

      <div class="panel-header">

        <div class="nombre-indicador">

          <h2>
            Disponibilidad general de planta
          </h2>

          <p>

          </p>

          ${textoPeriodoMesActual()}
        </div>

      </div>

      <div class="gerencial-disponibilidad-layout">

        <div class="gerencial-torta-wrapper">

          <div
            class="gerencial-torta"
            style="
              background:
              conic-gradient(
                ${gradientes.join(",")}
              );
            "
          >

            <div class="gerencial-torta-centro">

              <div class="gerencial-torta-etiqueta">
                Disponibilidad
              </div>

              <div class="gerencial-torta-valor">

                }

            </div>

          </div>

        </div>

        <div class="gerencial-leyenda">
          ${leyenda}
        </div>

      </div>

        <div class="gerencial-grupo-card">

          <div class="gerencial-grupo-header">

            <div class="gerencial-grupo-nombre">
              ${escaparHTMLTV(grupo.grupo)}
            </div>

            <div class="gerencial-grupo-badge">
              ${
                formatoNumeroTV(
                  grupo.cantidadLineas,
                  0
                )
              }
              líneas
            </div>

          </div>

          <div class="gerencial-grupo-valor">
            ${
              formatoPorcentajeTV(
                grupo.disponibilidad
              )
            }
          </div>

          <div class="gerencial-grupo-label">
            Disponibilidad
          </div>

          <div class="gerencial-grupo-detalles">

            <div>

              <div class="gerencial-grupo-detalle-label">
                Tiempo muerto
              </div>

              <div class="gerencial-grupo-detalle-valor">
                ${
                  formatoHorasTV(
                    grupo.tiempoMuerto
                  )
                }
              </div>

            </div>

            <div>

              <div class="gerencial-grupo-detalle-label">
                Ton perdidas
              </div>

              <div class="gerencial-grupo-detalle-valor">
                ${
                  formatoToneladasTV(
                    grupo.toneladasPerdidas
                  )
                }
              </div>

            </div>

          </div>

        </div>

      `).join("")
      : `

        <div class="mensaje-central">
          No hay información disponible
          para los grupos del mes actual.
        </div>

      `;

  slide.innerHTML = `

    <div class="panel">

      <div class="panel-header">

        <div class="nombre-indicador">

          <h2>
            Comparativo por grupos
          </h2>

          <p>
            El General Planta consolida Corrugado,
            Grupo 1 y Grupo 2.
          </p>

        </div>

        <div class="gerencial-periodo">
          Mes en curso:
          ${textoPeriodoMesActual()}
        </div>

      </div>

      <div class="gerencial-grupos-grid">
        ${contenido}
      </div>

    </div>

  `;
}
  
/* =========================================================
   RENDERIZADO GENERAL
========================================================= */

function renderizarTodosLosSlides(){

  slides.forEach(slide => {

    const tipo =
      slide.dataset.tipo;

    if(tipo === "servicio"){

      renderizarServicio(
        slide,
        slide.dataset.campo
      );

      return;
    }

    if(
      tipo ===
      "preventivos-resumen"
    ){

      renderizarPreventivosResumen(
        slide
      );

      return;
    }

    if(
      tipo ===
      "preventivos-area"
    ){

      renderizarPreventivosArea(
        slide
      );

      return;
    }

    if(
      tipo ===
      "correctivos-resumen"
    ){

      renderizarCorrectivosResumen(
        slide
      );

      return;
    }

    if(
      tipo ===
      "correctivos-lineas"
    ){

      renderizarCorrectivosLineas(
        slide
      );

      return;
    }
if(
  tipo ===
  "produccion-buena"
){

  renderizarProduccionBuena(
    slide
  );

  return;
}

if(
  tipo ===
  "produccion-scrap"
){

  renderizarProduccionScrap(
    slide
  );

  return;
}
    if(
      tipo ===
      "gerencial-disponibilidad"
    ){

      renderizarGerencialDisponibilidad(
        slide
      );

      return;
    }

    if(
      tipo ===
      "gerencial-tecnicos"
    ){

      renderizarGerencialTecnicos(
        slide
      );

      return;
    }

    if(
      tipo ===
      "gerencial-grupos"
    ){

      renderizarGerencialGrupos(
        slide
      );

      return;
    }
    
  });

}

/* =========================================================
   ROTACIÓN DE PANTALLAS
========================================================= */

function mostrarSlide(indice){

  if(indice < 0){
    indice = slides.length - 1;
  }

  if(indice >= slides.length){
    indice = 0;
  }

  slides.forEach(slide => {
    slide.classList.remove("activo");
  });

  indiceActual = indice;

  slides[
    indiceActual
  ].classList.add("activo");

  document.getElementById(
    "contador"
  ).textContent =
    (indiceActual + 1) +
    " / " +
    slides.length;

  reiniciarProgreso();

}

function siguienteSlide(manual = false){

  mostrarSlide(
    indiceActual + 1
  );

  if(
    manual &&
    !pausado
  ){
    reiniciarTemporizadorSlide();
  }

}

function anteriorSlide(){

  mostrarSlide(
    indiceActual - 1
  );

  if(!pausado){
    reiniciarTemporizadorSlide();
  }

}

function reiniciarTemporizadorSlide(){

  clearInterval(
    temporizadorSlide
  );

  if(pausado) return;

  temporizadorSlide =
    setInterval(() => {

      siguienteSlide(false);

    },DURACION_SLIDE);

}

function alternarPausa(){

  pausado = !pausado;

  const boton =
    document.getElementById(
      "btnPausa"
    );

  if(pausado){

    boton.textContent = "▶";

    clearInterval(
      temporizadorSlide
    );

    clearInterval(
      temporizadorProgreso
    );

  }else{

    boton.textContent = "❚❚";

    reiniciarTemporizadorSlide();

    reiniciarProgreso();

  }

}

/* =========================================================
   BARRA DE PROGRESO
========================================================= */

function reiniciarProgreso(){

  clearInterval(
    temporizadorProgreso
  );

  inicioSlide = Date.now();

  const barra =
    document.getElementById(
      "progress"
    );

  barra.style.width = "0%";

  if(pausado) return;

  temporizadorProgreso =
    setInterval(() => {

      const transcurrido =
        Date.now() -
        inicioSlide;

      const porcentaje =
        Math.min(
          100,
          transcurrido /
          DURACION_SLIDE *
          100
        );

      barra.style.width =
        porcentaje + "%";

      if(porcentaje >= 100){

        clearInterval(
          temporizadorProgreso
        );

      }

    },100);

}

/* =========================================================
   PANTALLA COMPLETA
========================================================= */

async function alternarPantallaCompleta(){

  try{

    if(!document.fullscreenElement){

      await document
        .documentElement
        .requestFullscreen();

    }else{

      await document
        .exitFullscreen();

    }

  }catch(error){

    mostrarError(
      "El navegador no permitió activar pantalla completa."
    );

  }

}

/* =========================================================
   ERRORES
========================================================= */

function mostrarError(mensaje){

  const caja =
    document.getElementById(
      "errorGlobal"
    );

  caja.textContent = mensaje;

  caja.style.display = "block";

  setTimeout(() => {

    caja.style.display = "none";

  },10000);

}

function ocultarError(){

  document.getElementById(
    "errorGlobal"
  ).style.display = "none";

}

/* =========================================================
   TECLADO
========================================================= */

document.addEventListener(
  "keydown",
  evento => {

    if(
      evento.key ===
      "ArrowRight"
    ){
      siguienteSlide(true);
    }

    if(
      evento.key ===
      "ArrowLeft"
    ){
      anteriorSlide();
    }

    if(evento.key === " "){

      evento.preventDefault();

      alternarPausa();

    }

    if(
      evento.key === "f" ||
      evento.key === "F"
    ){
      alternarPantallaCompleta();
    }

  }
);

/* =========================================================
   INICIO
========================================================= */

function iniciarPantallaTV(){

  actualizarReloj();

  setInterval(
    actualizarReloj,
    1000
  );

  renderizarTodosLosSlides();

  mostrarSlide(0);

  reiniciarTemporizadorSlide();

  cargarDatos();

  setInterval(
    cargarDatos,
    ACTUALIZACION_DATOS
  );

}

iniciarPantallaTV();

</script>
